<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora • Login</title>

<meta name="theme-color" content="#00AAFF">
<meta name="description" content="Login to your Viewora account">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="login.css">

</head>

<body>

<!-- =========================
Animated Aurora Background
========================= -->

<div class="aurora">

<div class="light light1"></div>
<div class="light light2"></div>
<div class="light light3"></div>

</div>

<!-- Floating Particles -->

<div id="particles"></div>

<!-- =========================
Premium Loader
========================= -->

<div id="pageLoader">

<div class="loaderLogo">

<img src="assets/logo.png"
alt="Viewora">

</div>

<h1>Viewora</h1>

<p>Welcome Back</p>

<div class="loaderBar">
<div class="loaderFill"></div>
</div>

</div>

<!-- =========================
Main App
========================= -->

<div id="app" class="hidden">

<div class="loginCard glass">

<!-- Logo -->

<div class="logoBox">

<img
src="assets/logo.png"
class="logo"
alt="Viewora">

<h1>Welcome Back</h1>

<p>Login to continue your journey</p>

</div>

<!-- Login Form -->

<form id="loginForm"
autocomplete="on">

<!-- Email -->

<div class="inputGroup">

<label>Email or Username</label>

<div class="inputBox">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="email"
placeholder="Enter email or username"
autocomplete="username"
required>

</div>

</div>

<!-- Password -->

<div class="inputGroup">

<label>Password</label>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter your password"
autocomplete="current-password"
required>

<button
type="button"
id="togglePassword"
class="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<!-- Remember + Forgot -->

<div class="optionsRow">

<label class="rememberBox">

<input
type="checkbox"
id="rememberMe">

<span>Remember Me</span>

</label>

<button
type="button"
id="forgotPassword"
class="forgotBtn">

Forgot Password?

</button>

</div>

<!-- Login Button -->

<button
type="submit"
id="loginBtn"
class="loginBtn">

<i class="fa-solid fa-right-to-bracket"></i>

<span>Login</span>

</button>

<!-- Divider -->

<div class="divider">

<span>OR</span>

</div>

<!-- Google Login -->

<button
type="button"
id="googleLogin"
class="googleBtn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="22"
height="22"
alt="Google">

<span>Continue with Google</span>

</button>

<!-- Signup -->

<div class="signupBox">

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>
<!-- Footer -->

<div class="footer">

<p>

© 2026 Viewora • Connect • Create • Inspire

</p>

</div>

</form>

</div>

</div>

<!-- =========================
Loading Overlay
========================= -->

<div id="loadingOverlay" class="hidden">

<div class="premiumLoader">

<div class="loaderRing"></div>

<div class="loaderRing delay1"></div>

<div class="loaderRing delay2"></div>

</div>

<p>Signing you in...</p>

</div>

<!-- =========================
Premium Toast
========================= -->

<div id="toast" class="hidden">

<i id="toastIcon"
class="fa-solid fa-circle-check"></i>

<span id="toastText">

Login Successful

</span>

</div>

<!-- =========================
Forgot Password Modal
========================= -->

<div
id="forgotModal"
class="modal hidden">

<div class="modalCard glass">

<div class="popupIcon">

<i class="fa-solid fa-envelope-circle-check"></i>

</div>

<h2>Reset Password</h2>

<p>

Enter your registered email address.<br>
We'll send you a password reset link.

</p>

<div class="inputGroup">

<div class="inputBox">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="resetEmail"
placeholder="Enter your email">

</div>

</div>

<div class="modalButtons">

<button
type="button"
id="sendResetBtn"
class="primaryBtn">

Send Link

</button>

<button
type="button"
id="closeForgot"
class="secondaryBtn">

Cancel

</button>

</div>

</div>

</div>

<!-- =========================
Firebase SDK
========================= -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<!-- Firebase Config -->

<script src="firebase.js"></script>

<!-- Login Script -->

<script src="login.js"></script>

<!-- Page Animation -->

<script>

window.addEventListener("load",()=>{

setTimeout(()=>{

const loader=document.getElementById("pageLoader");
const app=document.getElementById("app");

loader.style.opacity="0";

setTimeout(()=>{

loader.style.display="none";

app.classList.remove("hidden");

app.classList.add("fadeIn");

},500);

},1400);

});

</script>

</body>

</html>
