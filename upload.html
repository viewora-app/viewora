<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora • Upload</title>

<meta name="theme-color"
content="#6366f1">

<link rel="stylesheet"
href="upload.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- =========================
Animated Background
========================= -->

<div class="bgGradient"></div>

<div class="blob blob1"></div>

<div class="blob blob2"></div>

<div class="blob blob3"></div>

<!-- =========================
Header
========================= -->

<header class="header glass">

<button
id="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>

Create Post

</h2>

<button
id="draftBtn">

Draft

</button>

</header>

<!-- =========================
Upload Container
========================= -->

<main class="uploadContainer">

<!-- Upload Card -->

<div class="uploadCard glass">

<h2>

Create Amazing Post

</h2>

<p>

Share photos & videos with your followers.

</p>

<!-- Drag & Drop -->

<div id="dropArea">

<i class="fa-solid fa-cloud-arrow-up"></i>

<h3>

Drag & Drop Files

</h3>

<p>

or

</p>

<button
id="chooseFileBtn">

Choose File

</button>

<input
type="file"
id="mediaInput"
accept="image/*,video/*"
hidden>

</div>

<!-- Preview -->

<div
id="previewContainer"
class="hidden">

<img
id="previewImage"
hidden>

<video
id="previewVideo"
controls
playsinline
hidden>

</video>

<button
id="removeMedia">

<i class="fa-solid fa-trash"></i>

Remove

</button>

</div>

<!-- Progress -->

<div
id="progressBox"
class="hidden">

<div class="progressBar">

<div
id="progressFill">

</div>

</div>

<p
id="progressText">

0%

</p>

</div>
<!-- =========================
Caption
========================= -->

<div class="formGroup">

<label>

Caption

</label>

<textarea

id="caption"

maxlength="500"

placeholder="Write an awesome caption...">

</textarea>

<div class="counter">

<span id="captionCount">

0

</span>

/500

</div>

</div>

<!-- =========================
Hashtags
========================= -->

<div class="formGroup">

<label>

Hashtags

</label>

<input

type="text"

id="hashtags"

placeholder="#travel #gaming #music">

</div>

<!-- =========================
Location
========================= -->

<div class="formGroup">

<label>

Location

</label>

<input

type="text"

id="location"

placeholder="Add location">

</div>

<!-- =========================
Visibility
========================= -->

<div class="formGroup">

<label>

Who can see this?

</label>

<select id="visibility">

<option value="public">

🌍 Public

</option>

<option value="followers">

👥 Followers

</option>

<option value="private">

🔒 Private

</option>

</select>

</div>

<!-- =========================
Options
========================= -->

<div class="optionRow">

<label>

Allow Comments

</label>

<input

type="checkbox"

id="allowComments"

checked>

</div>

<div class="optionRow">

<label>

Allow Downloads

</label>

<input

type="checkbox"

id="allowDownload">

</div>

<!-- =========================
Buttons
========================= -->

<div class="buttonGroup">

<button
id="uploadPostBtn">

<i class="fa-solid fa-cloud-arrow-up"></i>

Upload Post

</button>

<button
id="cancelBtn">

Cancel

</button>

</div>

</div>

</main>

<!-- =========================
Toast
========================= -->

<div
id="toast"
class="hidden">

<i
id="toastIcon"
class="fa-solid fa-circle-check">

</i>

<span
id="toastText">

Success

</span>

</div>

<!-- =========================
Firebase
========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- =========================
App Files
========================= -->

<script src="firebase.js"></script>

<script src="upload.js"></script>

</body>
</html>
