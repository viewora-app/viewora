<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewora • Upload</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; color: white; padding-bottom: 80px; }
        .upload-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 30px;
            background: #1b1b1b;
            border-radius: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 15px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn-upload {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00aaff, #0088cc);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        #mediaPreview {
            margin-top: 15px;
            text-align: center;
        }
        #mediaPreview img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h1 style="text-align:center; margin-bottom:25px;">🚀 Upload Content</h1>

        <div class="form-group">
            <label>Title / Caption *</label>
            <input type="text" id="title" placeholder="Enter a catchy title" required>
        </div>

        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea id="description" placeholder="Write something about your post..."></textarea>
        </div>

        <div class="form-group">
            <label>Image / Video URL (Optional)</label>
            <input type="text" id="mediaUrl" placeholder="https://example.com/image.jpg or video.mp4">
        </div>

        <div id="mediaPreview"></div>

        <button onclick="uploadContent()" class="btn-upload">🚀 Upload Now</button>

        <p style="text-align:center; margin-top:25px; color:#777; font-size:14px;">
            Full video upload with Firebase Storage coming soon...
        </p>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html">🏠<br>Home</a>
        <a href="vieworation.html">🏘️<br>Vieworation</a>
        <a href="shorts.html">▶️<br>Shorts</a>
        <a href="upload.html" class="active">➕<br>Upload</a>
        <a href="users.html">👥<br>Users</a>
        <a href="profile.html">👤<br>Profile</a>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script src="firebase.js"></script>
    <script src="upload.js"></script>
    <script src="nav.js"></script>
</body>
</html>
