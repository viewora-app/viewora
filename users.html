<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

body{

background:#090909;
color:#fff;
overflow-x:hidden;
padding-bottom:120px;

}

/* Animated Background */

body::before{

content:"";

position:fixed;

top:-40%;
left:-40%;

width:180%;
height:180%;

background:

radial-gradient(circle,#00aaff22 0%,transparent 45%),

radial-gradient(circle,#ff008822 0%,transparent 40%),

radial-gradient(circle,#00ff9922 0%,transparent 40%);

animation:bgMove 18s linear infinite;

z-index:-2;

filter:blur(30px);

}

@keyframes bgMove{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

/* Premium Header */

.header{

position:sticky;

top:0;

z-index:999;

padding:18px 20px;

backdrop-filter:blur(18px);

background:rgba(20,20,20,.72);

border-bottom:1px solid rgba(255,255,255,.08);

display:flex;

justify-content:space-between;

align-items:center;

}

.logo{

font-size:28px;

font-weight:700;

background:linear-gradient(90deg,#00aaff,#00ffee);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.online{

display:flex;

align-items:center;

gap:8px;

font-size:14px;

color:#aaa;

}

.online-dot{

width:10px;

height:10px;

border-radius:50%;

background:#00ff66;

box-shadow:0 0 15px #00ff66;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{

transform:scale(.8);

opacity:.6;

}

50%{

transform:scale(1.2);

opacity:1;

}

100%{

transform:scale(.8);

opacity:.6;

}

}

/* Search */

.search-wrapper{

padding:18px;

}

.search-box{

display:flex;

align-items:center;

gap:12px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:14px 18px;

border-radius:18px;

transition:.35s;

}

.search-box:focus-within{

border-color:#00aaff;

box-shadow:0 0 25px rgba(0,170,255,.35);

transform:translateY(-2px);

}

.search-icon{

font-size:22px;

}

#search{

flex:1;

border:none;

outline:none;

background:transparent;

color:#fff;

font-size:15px;

}

#search::placeholder{

color:#888;

}

/* Counter */

.counter{

margin:0 18px;

padding:14px;

border-radius:18px;

background:linear-gradient(135deg,#00aaff,#0066ff);

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 10px 25px rgba(0,170,255,.35);

}

.counter h3{

font-size:16px;

font-weight:600;

}

.counter span{

font-size:22px;

font-weight:700;

}

#usersList{

padding:18px;

}

</style>

<script>

window.addEventListener("load",()=>{

});

});

// User Counter Update

function updateUserCounter(){

const counter=document.getElementById("userCount");

if(counter && typeof allUsers!=="undefined"){

counter.textContent=allUsers.length;

}

}

setInterval(updateUserCounter,1000);

<style>

/* ============================= */
/* Network Banner */
/* ============================= */

#networkBanner{

position:fixed;

top:-70px;

left:50%;

transform:translateX(-50%);

padding:14px 28px;

border-radius:30px;

background:linear-gradient(135deg,#00d26a,#00a651);

color:#fff;

font-weight:600;

z-index:99999;

transition:.4s;

box-shadow:0 10px 25px rgba(0,0,0,.35);

}

/* ============================= */
/* Welcome Toast */
/* ============================= */

#welcomeToast{

position:fixed;

bottom:100px;

left:50%;

transform:translateX(-50%);

background:linear-gradient(135deg,#00aaff,#0066ff);

padding:15px 28px;

border-radius:30px;

font-weight:600;

opacity:0;

transition:.4s;

box-shadow:0 10px 30px rgba(0,170,255,.35);

z-index:99999;

}

/* ============================= */
/* Floating Background Orbs */
/* ============================= */

.bg-orb{

position:fixed;

border-radius:50%;

filter:blur(70px);

opacity:.18;

z-index:-3;

animation:floatOrb 16s linear infinite;

}

.orb1{

width:220px;

height:220px;

background:#00aaff;

top:10%;

left:-60px;

}

.orb2{

width:260px;

height:260px;

background:#ff00aa;

bottom:10%;

right:-80px;

animation-duration:20s;

}

@keyframes floatOrb{

0%{

transform:translateY(0) rotate(0deg);

}

50%{

transform:translateY(-40px) rotate(180deg);

}

100%{

transform:translateY(0) rotate(360deg);

}

}

</style>

<div class="bg-orb orb1"></div>

<div class="bg-orb orb2"></div>

<script>

/* ============================= */
/* Welcome Animation */
/* ============================= */

window.addEventListener("load",()=>{

const toast=document.getElementById("welcomeToast");

toast.style.opacity="1";

setTimeout(()=>{

toast.style.opacity="0";

},2500);

});

/* ============================= */
/* Internet Status */
/* ============================= */

const banner=document.getElementById("networkBanner");

window.addEventListener("online",()=>{

banner.innerHTML="🟢 Internet Connected";

banner.style.background="linear-gradient(135deg,#00d26a,#00a651)";

banner.style.top="20px";

setTimeout(()=>{

banner.style.top="-70px";

},2500);

});

window.addEventListener("offline",()=>{

banner.innerHTML="🔴 No Internet";

banner.style.background="linear-gradient(135deg,#ff3b5c,#d90429)";

banner.style.top="20px";

});

/* ============================= */
/* Pull To Refresh */
/* ============================= */

let startY=0;

window.addEventListener("touchstart",e=>{

startY=e.touches[0].clientY;

});

window.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY;

if(endY-startY>130){

location.reload();

}

});

/* ============================= */
/* Smooth Card Animation */
/* ============================= */

document.addEventListener("click",e=>{

const card=e.target.closest(".user-card");

if(card){

card.animate([

{transform:"scale(1)"},

{transform:"scale(.96)"},

{transform:"scale(1)"}

],{

duration:180

});

}

});

/* ============================= */
/* Final */
/* ============================= */

console.log("🚀 Users.html Premium V3.0 Loaded");

</script>
