<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Viewora</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; color: white; padding: 20px; }
        .setting-card {
            background: #1b1b1b;
            padding: 18px 20px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
        }
        .setting-card:hover { background: #252525; }
        .logout-btn { 
            background: #ff4757; 
            color: white; 
            width: 100%; 
            padding: 14px; 
            margin: 20px 0; 
            border-radius: 30px; 
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center; margin-bottom:20px;">⚙️ Settings</h1>
    
    <div id="userInfo" style="text-align:center; margin:20px 0; font-size:18px; color:#00aaff;">
        Loading...
    </div>

    <div class="setting-card" onclick="editProfile()">👤 Edit Profile</div>
    <div class="setting-card" onclick="goToNotifications()">🔔 Notifications</div>
    <div class="setting-card" onclick="toggleDarkMode()">🌙 Dark Mode</div>
    <div class="setting-card" onclick="window.open('privacy.html', '_blank')">
    🔒 Privacy Policy</div>
    <div class="setting-card">ℹ️ About Viewora</div>
    <div class="setting-card">📜 Terms & Conditions</div>
    <div class="setting-card">❓ Help & Support</div>

    <button class="logout-btn" onclick="logout()">🚪 Logout</button>

    <a href="profile.html">
        <button style="background:#333; width:100%; padding:14px; border-radius:30px;">← Back to Profile</button>
    </a>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
<script src="firebase.js"></script>
<script src="settings.js"></script>
<script src="nav.js"></script>

</body>
</html>
