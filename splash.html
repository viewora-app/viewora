<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora Splash</title>

<link rel="stylesheet" href="splash.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- Animated Background -->

<div class="gradient"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="particles">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<!-- Splash Container -->

<div class="splash">

<!-- Logo -->

<div class="logoBox">

<div class="logoGlow"></div>

<img
src="assets/logo.png"
class="logo"
alt="Viewora">

</div>

<!-- Brand -->

<h1 class="brand">

Viewora

</h1>

<p class="tagline">

Connect • Create • Earn

</p>

<!-- Loader -->

<div class="loader">

<div class="loaderFill"></div>

</div>

<p id="loadingText">

Initializing...

</p>

<!-- Version -->

<div class="version">

Version 1.0

</div>

</div>

<script src="splash.js"></script>

</body>
</html>
