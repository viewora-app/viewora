<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora Calling</title>

<link rel="stylesheet" href="outgoing-call.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#fff;

}

.background{

position:fixed;
inset:0;

background:
linear-gradient(135deg,#2b1055,#7597de);

animation:bgMove 8s infinite alternate;

}

@keyframes bgMove{

0%{

filter:hue-rotate(0deg);

}

100%{

filter:hue-rotate(60deg);

}

}

.container{

position:relative;

z-index:10;

text-align:center;

width:100%;

padding:30px;

}

.avatar{

width:140px;

height:140px;

border-radius:50%;

border:4px solid rgba(255,255,255,.3);

object-fit:cover;

box-shadow:0 0 40px rgba(255,255,255,.35);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.08);

}

100%{

transform:scale(1);

}

}

h2{

margin-top:20px;

font-size:28px;

}

#callType{

margin-top:10px;

font-size:18px;

opacity:.9;

}

#status{

margin-top:12px;

font-size:15px;

opacity:.75;

}

.wave{

display:flex;

justify-content:center;

margin-top:30px;

gap:8px;

}

.wave span{

width:8px;

height:35px;

border-radius:10px;

background:#fff;

animation:wave .8s infinite;

}

.wave span:nth-child(2){

animation-delay:.1s;

}

.wave span:nth-child(3){

animation-delay:.2s;

}

.wave span:nth-child(4){

animation-delay:.3s;

}

.wave span:nth-child(5){

animation-delay:.4s;

}

@keyframes wave{

0%,100%{

height:18px;

}

50%{

height:45px;

}

}

.actions{

position:absolute;

bottom:60px;

left:50%;

transform:translateX(-50%);

}

#cancelBtn{

width:75px;

height:75px;

border:none;

border-radius:50%;

background:#ff3b30;

color:#fff;

font-size:30px;

cursor:pointer;

box-shadow:0 10px 30px rgba(255,0,0,.45);

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

<img
id="callerPhoto"
class="avatar"
src="assets/default-avatar.png">

<h2 id="callerName">
Calling...
</h2>

<div id="callType">
Voice Call
</div>

<div id="status">
Ringing...
</div>

<div class="wave">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

</div>

<div class="actions">

<button id="cancelBtn">

📞

</button>

</div>

<audio
id="ringtone"
loop
autoplay>

<source
src="assets/outgoing.mp3"
type="audio/mpeg">

</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="firebase.js"></script>

<script src="outgoing-call.js"></script>

</body>
</html>
