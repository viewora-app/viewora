<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora • Home</title>

    <link rel="stylesheet" href="index.css">

</head>

<body>

<!-- ========================= -->
<!-- PAGE LOADER -->
<!-- ========================= -->

<div id="pageLoader">

<div class="loader"></div>

<h1>Viewora</h1>

<p>Loading your world...</p>

</div>

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<header class="header">

<div class="logo">

Viewora

</div>

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search creators, posts...">

</div>

<div class="headerIcons">

<button
id="notificationBtn"
onclick="location.href='notifications.html'">

🔔

</button>

<button
id="uploadBtn"
onclick="location.href='upload.html'">

➕

</button>

</div>

</header>

<!-- ========================= -->
<!-- STORIES -->
<!-- ========================= -->

<section class="storiesSection">

<div id="storiesContainer">

<div class="yourStory"
onclick="createStory()">

<div class="storyRing">

<img
src="users.jpg"
alt="Your Story">

</div>

<p>Your Story</p>

</div>

</div>

</section>

<!-- ========================= -->
<!-- STORY PREVIEW -->
<!-- ========================= -->

<div id="storyPreview"></div>

<!-- ========================= -->
<!-- STORY UPLOAD -->
<!-- ========================= -->

<div
id="storyUploadBox"
style="display:none;">

<div class="uploadBar">

<div id="storyUploadBar"></div>

</div>

<p id="storyUploadText">

Uploading...

</p>

</div>

<!-- ========================= -->
<!-- HOME FEED -->
<!-- ========================= -->

<main>

<div id="feedContainer">

<div class="loadingFeed">

<div class="feedLoader"></div>

<h3>Loading Feed...</h3>

</div>

</div>

</main>

<!-- ========================= -->
<!-- STORY VIEWER -->
<!-- ========================= -->

<div
id="storyViewer"
style="display:none;">

<div id="storyProgressContainer">

<div id="storyProgress"></div>

</div>

<button
id="closeStory"
onclick="closeStory()">

✕

</button>

<img
id="storyImage"
hidden>

<video
id="storyVideo"
playsinline
controls
hidden>

</video>

<div id="storyBottom">

<button id="likeStory">

❤️

</button>

<input
type="text"
id="storyReply"
placeholder="Reply...">

<button id="sendReply">

Send

</button>

</div>

</div>

<!-- ========================= -->
<!-- COMMENTS -->
<!-- ========================= -->

<div id="commentModal">

<div class="commentBox">

<div class="commentHeader">

<h3>Comments</h3>

<button
onclick="closeComments()">

✕

</button>

</div>

<div id="commentsList"></div>

<div class="commentInput">

<input
type="text"
id="commentText"
placeholder="Write a comment...">

<button
id="sendComment">

Send

</button>

</div>

</div>

</div>

<!-- ========================= -->
<!-- FLOATING CHAT -->
<!-- ========================= -->

<button
id="floatingChat"
onclick="location.href='messages.html'">

💬

</button>

   <!-- Bottom Navigation -->
<nav class="bottomNav">

    <a href="index.html">
        <span>🏠</span>
        Home
    </a>

    <a href="shorts.html">
        <span>▶️</span>
        Shorts
    </a>

    <a href="users.html">
        <span>👥</span>
        Users
    </a>

    <a href="profile.html">
        <span>👤</span>
        Profile
    </a>

</nav>

<!-- ========================= -->
<!-- FILE INPUT -->
<!-- ========================= -->

<input
type="file"
id="storyFile"
accept="image/*,video/*"
hidden>

<!-- ========================= -->
<!-- FIREBASE -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- ========================= -->
<!-- APP FILES -->
<!-- ========================= -->

<script src="firebase.js"></script>
<script src="stories.js"></script>
<script src="comments.js"></script>
<script src="nav.js"></script>
<script src="index.js"></script>

<script>

window.addEventListener("load",()=>{

const loader=document.getElementById("pageLoader");

setTimeout(()=>{

loader.style.opacity="0";

setTimeout(()=>{

loader.remove();

},500);

},700);

});

</script>

</body>
</html>
