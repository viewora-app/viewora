<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewora • Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #111; 
            color: white; 
            padding-bottom: 80px; 
        }
        .header {
            background: #1b1b1b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .logo { 
            font-size: 22px; 
            font-weight: 700; 
            color: #00aaff; 
        }
        .post-card {
            background: #1b1b1b;
            margin: 15px;
            border-radius: 16px;
            padding: 16px;
            border-left: 4px solid #00aaff;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">Viewora</div>
        <div style="flex:1;">
            <input type="text" id="searchInput" placeholder="Search posts..." 
                   style="width:100%; padding:12px 20px; border-radius:30px; background:#2a2a2a; border:none; color:white;">
        </div>
        
        <div style="display:flex; gap:18px; font-size:26px; cursor:pointer;">
            <div onclick="window.location.href='upload.html'" title="Upload">➕</div>
            <div onclick="window.location.href='notifications.html'" title="Notifications">🔔</div>
        </div>
    </div>

<div id="storiesContainer" class="stories-scroll"></div>
</div>
    <!-- Feed -->
    <div id="feedContainer">
        <p style="text-align:center; padding:60px; color:#666;">Loading feed...</p>
    </div>

    <!-- Bottom Navigation -->
<div class="bottom-nav">

<a href="index.html">

<span class="nav-icon">🏠</span>

Home

</a>

<a href="vieworation.html">

<span class="nav-icon">🌍</span>

Vieworation

</a>

<a href="shorts.html">

<span class="nav-icon">▶️</span>

Shorts

</a>

<a href="users.html" class="active">

<span class="nav-icon">👥</span>

Userslist

</a>

<a href="profile.html">

<span class="nav-icon">👤</span>

Profile

</a>

</div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script src="firebase.js"></script>
    <script src="index.js"></script>
    <script src="nav.js"></script>
    <script src="comments.js"></script>
    
    <style>
      #floatingChat{
    animation: pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow{

    0%,100%{
        transform: scale(1);
        box-shadow:
            0 8px 25px rgba(0,170,255,.35),
            0 0 12px rgba(0,170,255,.25);
    }

    50%{
        transform: scale(1.05);
        box-shadow:
            0 12px 35px rgba(0,170,255,.55),
            0 0 25px rgba(0,170,255,.45);
    }

}
    </style>
    
    <button id="floatingChat" onclick="window.location.href='messages.html'">
    💬
</button>

</body>
</html>
