<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Incoming Call • Viewora</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;

}

.bg{

position:fixed;
inset:0;

background:
linear-gradient(-45deg,
#0f2027,
#203a43,
#2c5364,
#4b6cb7);

background-size:400% 400%;

animation:bg 12s infinite ease;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.blur{

position:absolute;

width:260px;
height:260px;

border-radius:50%;

background:rgba(255,255,255,.08);

filter:blur(80px);

animation:float 6s infinite alternate;

}

.blur:nth-child(2){

right:-70px;
bottom:-70px;

}

@keyframes float{

from{

transform:translateY(-20px);

}

to{

transform:translateY(30px);

}

}

.container{

position:relative;

z-index:10;

text-align:center;

padding:25px;

width:100%;

}

.avatar{

width:150px;

height:150px;

border-radius:50%;

object-fit:cover;

border:5px solid rgba(255,255,255,.25);

box-shadow:0 0 40px rgba(255,255,255,.25);

animation:ring 2s infinite;

}

@keyframes ring{

0%{

transform:scale(1);

}

50%{

transform:scale(1.07);

}

100%{

transform:scale(1);

}

}

h2{

margin-top:20px;

font-size:30px;

}

#callType{

margin-top:10px;

font-size:19px;

opacity:.9;

}

#status{

margin-top:10px;

font-size:15px;

opacity:.75;

}

.wave{

display:flex;

justify-content:center;

margin-top:28px;

gap:8px;

}

.wave span{

width:7px;

height:35px;

background:#fff;

border-radius:20px;

animation:wave .8s infinite;

}

.wave span:nth-child(2){animation-delay:.1s;}
.wave span:nth-child(3){animation-delay:.2s;}
.wave span:nth-child(4){animation-delay:.3s;}
.wave span:nth-child(5){animation-delay:.4s;}

@keyframes wave{

0%,100%{

height:18px;

}

50%{

height:46px;

}

}

.actions{

margin-top:60px;

display:flex;

justify-content:center;

gap:70px;

}

.btn{

width:78px;

height:78px;

border:none;

border-radius:50%;

font-size:30px;

cursor:pointer;

transition:.25s;

}

.accept{

background:#00c853;

color:#fff;

box-shadow:0 10px 25px rgba(0,200,83,.45);

}

.reject{

background:#ff1744;

color:#fff;

box-shadow:0 10px 25px rgba(255,23,68,.45);

}

.btn:active{

transform:scale(.92);

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="blur"></div>

<div class="blur"></div>

<div class="container">

<img
id="callerPhoto"
class="avatar"
src="assets/default-avatar.png">

<h2 id="callerName">

Incoming Call

</h2>

<div id="callType">

📞 Voice Call

</div>

<div id="status">

Ringing...

</div>

<div class="wave">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<div class="actions">

<button
id="rejectBtn"
class="btn reject">

✕

</button>

<button
id="acceptBtn"
class="btn accept">

✓

</button>

</div>

</div>

<audio
id="ringtone"
loop
autoplay>

<source
src="assets/ringtone.mp3"
type="audio/mpeg">

</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="firebase.js"></script>

<script src="incoming-call.js"></script>

</body>
</html>
