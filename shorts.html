<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewora • Shorts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .shorts-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .short {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            border-bottom: 1px solid #222;
        }

        .short.active {
            transform: scale(1);
            opacity: 1;
        }

        .short-content {
            width: 90%;
            max-width: 420px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
        }

        .short-title {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .short-user {
            color: #aaa;
            margin-bottom: 20px;
        }

        .short-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .short-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
        }

        .like-btn {
            background: #ff2d55;
            color: white;
        }

        .comment-btn {
            background: #444;
            color: white;
        }

        /* Comment Box */
        #commentBox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1b1b1b;
            padding: 15px;
            display: none;
            z-index: 200;
        }

        #commentInput {
            width: 70%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #2a2a2a;
            color: white;
            font-size: 15px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <a href="index.html">← Viewora Shorts</a>
    </div>

    <!-- Shorts Container -->
    <div class="shorts-container" id="shortsContainer">
        <!-- Shorts will be loaded dynamically by shorts.js -->
    </div>

    <!-- Comment Box -->
    <div id="commentBox">
        <input type="text" id="commentInput" placeholder="Write a comment...">
        <button onclick="sendComment()" style="margin-left:10px; padding:10px 18px; border-radius:20px; background:#00aaff; color:white; border:none;">
            Send
        </button>
    </div>

    <!-- Bottom Navigation -->

<style>
  #floatingChat{
    animation: pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow{

    0%,100%{
        transform: scale(1);
        box-shadow:
            0 8px 25px rgba(0,170,255,.35),
            0 0 12px rgba(0,170,255,.25);
    }

    50%{
        transform: scale(1.05);
        box-shadow:
            0 12px 35px rgba(0,170,255,.55),
            0 0 25px rgba(0,170,255,.45);
    }

}
</style>
