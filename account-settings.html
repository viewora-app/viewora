<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>👤 Account Settings • Viewora</title>

<link rel="stylesheet" href="style.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:#0d1117;
color:#fff;
overflow-x:hidden;
padding-bottom:120px;

}

/* Animated Background */

body::before{

content:"";

position:fixed;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:

radial-gradient(circle,#00aaff22,transparent 35%),

radial-gradient(circle,#ff00aa22,transparent 35%),

radial-gradient(circle,#00ff8822,transparent 35%);

animation:bgRotate 20s linear infinite;

z-index:-1;

}

@keyframes bgRotate{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

/* Header */

.header{

padding:30px;

text-align:center;

background:linear-gradient(135deg,#00aaff,#0066ff);

border-bottom-left-radius:35px;

border-bottom-right-radius:35px;

box-shadow:0 15px 35px rgba(0,170,255,.30);

}

.header h1{

font-size:30px;

}

.header p{

margin-top:8px;

opacity:.9;

}

/* Profile Card */

.profile-card{

width:92%;

margin:25px auto;

padding:25px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(16px);

border-radius:25px;

border:1px solid rgba(255,255,255,.08);

text-align:center;

animation:zoom .5s;

}

@keyframes zoom{

from{

opacity:0;

transform:scale(.9);

}

to{

opacity:1;

transform:scale(1);

}

}

.profile-photo{

position:relative;

display:inline-block;

}

.profile-photo img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #00aaff;

box-shadow:0 0 25px rgba(0,170,255,.45);

}

.change-photo{

position:absolute;

bottom:0;

right:0;

width:38px;

height:38px;

border-radius:50%;

background:#00aaff;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

font-size:18px;

box-shadow:0 6px 15px rgba(0,170,255,.35);

}

.profile-card h2{

margin-top:18px;

font-size:24px;

}

.profile-card p{

margin-top:6px;

color:#aaa;

}

.edit-btn{

margin-top:20px;

padding:12px 28px;

border:none;

border-radius:30px;

background:linear-gradient(135deg,#00aaff,#0088ff);

color:#fff;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.edit-btn:hover{

transform:translateY(-3px);

box-shadow:0 10px 25px rgba(0,170,255,.35);

}

.section-title{

width:92%;

margin:25px auto 15px;

font-size:20px;

font-weight:bold;

color:#00aaff;

}

.form-container{

width:92%;

margin:auto;

}

</style>

</head>

<body>

<div class="header">

<h1>👤 Account Settings</h1>

<p>Manage your personal information</p>

</div>

<div class="profile-card">

<div class="profile-photo">

<img
id="profilePhoto"
src="non.jpg">

<div
class="change-photo"
onclick="changeProfilePhoto()">

📷

</div>

</div>

<h2 id="profileName">

Loading...

</h2>

<p id="profileUsername">

@loading

</p>

<button
class="edit-btn"
onclick="changeProfilePhoto()">

📸 Change Profile Picture

</button>

</div>

<h2 class="section-title">

Personal Information

</h2>

<div class="form-container">
  <!-- ========================= -->
<!-- Full Name -->
<!-- ========================= -->

<div class="input-group">

<label>👤 Full Name</label>

<input
type="text"
id="fullName"
placeholder="Enter your full name">

</div>

<!-- Username -->

<div class="input-group">

<label>🆔 Username</label>

<input
type="text"
id="username"
placeholder="@username">

</div>

<!-- Email -->

<div class="input-group">

<label>📧 Email Address</label>

<input
type="email"
id="email"
placeholder="example@email.com">

</div>

<!-- Phone -->

<div class="input-group">

<label>📱 Phone Number</label>

<input
type="tel"
id="phone"
placeholder="+91XXXXXXXXXX">

</div>

<!-- Birthday -->

<div class="input-group">

<label>🎂 Birthday</label>

<input
type="date"
id="birthday">

</div>

<!-- Gender -->

<div class="input-group">

<label>⚧️ Gender</label>

<select id="gender">

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

<option>Prefer not to say</option>

</select>

</div>

<!-- Bio -->

<div class="input-group">

<label>📝 Bio</label>

<textarea
id="bio"
rows="4"
maxlength="150"
placeholder="Tell everyone about yourself..."></textarea>

<div class="char-counter">

<span id="bioCount">0</span>/150

</div>

</div>

<style>

/* ========================= */
/* Form */
/* ========================= */

.input-group{

margin-bottom:22px;

animation:fadeUp .6s ease forwards;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:bold;

color:#00aaff;

}

.input-group input,
.input-group select,
.input-group textarea{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:16px;

background:rgba(255,255,255,.08);

color:#fff;

font-size:15px;

transition:.3s;

border:1px solid rgba(255,255,255,.08);

}

.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus{

border:1px solid #00aaff;

box-shadow:0 0 15px rgba(0,170,255,.35);

transform:scale(1.01);

}

.input-group textarea{

resize:none;

min-height:110px;

}

.input-group select{

cursor:pointer;

}

.input-group option{

background:#111;

color:#fff;

}

.char-counter{

text-align:right;

margin-top:6px;

font-size:12px;

color:#888;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

<script>

// Bio Counter

const bio=document.getElementById("bio");

const bioCount=document.getElementById("bioCount");

bio.addEventListener("input",()=>{

bioCount.innerText=bio.value.length;

});

</script>
<!-- ========================= -->
<!-- Action Buttons -->
<!-- ========================= -->

<div class="action-buttons">

    <button
        class="save-btn"
        onclick="saveProfile()">

        💾 Save Changes

    </button>

    <button
        class="reset-btn"
        onclick="resetForm()">

        🔄 Reset

    </button>

    <button
        class="remove-btn"
        onclick="removeProfilePhoto()">

        🗑 Remove Profile Photo

    </button>

    <button
        class="back-btn"
        onclick="window.location.href='settings.html'">

        ⬅ Back to Settings

    </button>

</div>

</div>

<!-- ========================= -->
<!-- Footer -->
<!-- ========================= -->

<div class="footer">

    <h3>✨ Viewora Account</h3>

    <p>
        Keep your profile updated so friends can find you easily.
    </p>

    <span>
        Viewora v1.0.0
    </span>

</div>

<style>

/* ========================= */
/* Buttons */
/* ========================= */

.action-buttons{

margin-top:30px;

display:flex;

flex-direction:column;

gap:15px;

}

.action-buttons button{

padding:16px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.save-btn{

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

box-shadow:0 8px 25px rgba(0,170,255,.35);

}

.save-btn:hover{

transform:translateY(-3px);

}

.reset-btn{

background:#2b2b2b;

color:#fff;

}

.reset-btn:hover{

background:#3a3a3a;

}

.remove-btn{

background:linear-gradient(135deg,#ff3b30,#d50000);

color:#fff;

}

.remove-btn:hover{

transform:translateY(-3px);

}

.back-btn{

background:#444;

color:#fff;

}

.back-btn:hover{

background:#555;

}

/* ========================= */
/* Footer */
/* ========================= */

.footer{

width:92%;

margin:45px auto;

padding:25px;

text-align:center;

background:rgba(255,255,255,.05);

border-radius:20px;

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(15px);

animation:fadeFooter .8s;

}

.footer h3{

color:#00aaff;

margin-bottom:10px;

}

.footer p{

color:#aaa;

margin-bottom:10px;

}

.footer span{

font-size:13px;

color:#666;

}

/* Animation */

@keyframes fadeFooter{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>
<!-- ========================= -->
<!-- Firebase -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="account-settings.js"></script>

<script>

// Premium Page Animation

document.body.style.opacity="0";

window.addEventListener("load",()=>{

document.body.style.transition="opacity .45s ease";

document.body.style.opacity="1";

});

// Internet Status

window.addEventListener("online",()=>{

if(typeof showToast==="function"){

showToast("🌐 Internet Connected");

}

});

window.addEventListener("offline",()=>{

if(typeof showToast==="function"){

showToast("❌ Internet Disconnected");

}

});

// Ripple Effect

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("click",function(e){

const ripple=document.createElement("span");

const rect=this.getBoundingClientRect();

const size=Math.max(rect.width,rect.height);

ripple.style.width=size+"px";

ripple.style.height=size+"px";

ripple.style.left=(e.clientX-rect.left-size/2)+"px";

ripple.style.top=(e.clientY-rect.top-size/2)+"px";

ripple.style.position="absolute";

ripple.style.background="rgba(255,255,255,.35)";

ripple.style.borderRadius="50%";

ripple.style.transform="scale(0)";

ripple.style.animation="ripple .6s linear";

ripple.style.pointerEvents="none";

this.style.position="relative";

this.style.overflow="hidden";

this.appendChild(ripple);

setTimeout(()=>{

ripple.remove();

},600);

});

});

</script>

<style>

@keyframes ripple{

to{

transform:scale(4);

opacity:0;

}

}

</style>

</body>

</html>
