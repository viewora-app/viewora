<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora • Profile</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0b0b0b;
color:#fff;
overflow-x:hidden;
padding-bottom:90px;

}

/* Animated Background */

body::before{

content:"";
position:fixed;
left:-30%;
top:-30%;
width:160%;
height:160%;

background:
radial-gradient(circle,#00aaff22,transparent 45%),
radial-gradient(circle at bottom,#ff006622,transparent 45%);

animation:bgMove 18s linear infinite;
z-index:-2;

}

@keyframes bgMove{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

/* Banner */

.profile-banner{

height:220px;
position:relative;
overflow:hidden;

background:
linear-gradient(135deg,
#00aaff,
#0055ff,
#7b2cff);

background-size:300% 300%;

animation:bannerMove 8s ease infinite;

}

@keyframes bannerMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.profile-banner img{

width:100%;
height:100%;
object-fit:cover;
opacity:.28;

}

/* Dark Overlay */

.profile-banner::after{

content:"";
position:absolute;
left:0;
right:0;
top:0;
bottom:0;

background:

linear-gradient(

transparent,

rgba(0,0,0,.45),

#0b0b0b

);

}

/* Settings */

.settings-btn{

position:absolute;
right:18px;
top:18px;

width:48px;
height:48px;

border:none;
border-radius:50%;

background:rgba(0,0,0,.45);

backdrop-filter:blur(10px);

color:white;
font-size:22px;

cursor:pointer;

transition:.35s;

z-index:5;

}

.settings-btn:hover{

transform:rotate(90deg);

background:#00aaff;

}

/* Main Card */

.profile-card{

margin-top:-72px;

position:relative;

z-index:10;

text-align:center;

padding:0 18px;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

/* Story Ring */

#storyRing{

width:156px;
height:156px;

margin:auto;

border-radius:50%;

padding:5px;

background:

linear-gradient(
45deg,
#ff0066,
#ff9800,
#00aaff,
#6a5cff
);

background-size:300%;

animation:ringMove 4s linear infinite;

display:flex;
align-items:center;
justify-content:center;

position:relative;

cursor:pointer;

box-shadow:

0 0 25px #00aaff66;

}

@keyframes ringMove{

0%{background-position:0%;}
100%{background-position:300%;}

}

#profilePic{

width:142px;
height:142px;

border-radius:50%;

border:5px solid #111;

object-fit:cover;

background:#222;

transition:.4s;

}

#profilePic:hover{

transform:scale(1.05);

}

/* Story Plus */

.add-story{

position:absolute;

right:6px;
bottom:8px;

width:40px;
height:40px;

border-radius:50%;

background:#00aaff;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

font-weight:bold;

border:3px solid #111;

cursor:pointer;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{

transform:scale(1);

box-shadow:0 0 0 0 #00aaff88;

}

70%{

box-shadow:0 0 0 16px transparent;

}

100%{

transform:scale(1);

}

}

.profile-name{

font-size:34px;
font-weight:bold;

margin-top:18px;

letter-spacing:.5px;

}

.verified{

color:#00aaff;

font-size:28px;

margin-left:6px;

animation:verifyGlow 2s infinite;

}

@keyframes verifyGlow{

0%,100%{

text-shadow:0 0 8px #00aaff;

}

50%{

text-shadow:0 0 18px #00aaff;

}

}

.profile-username{

margin-top:8px;

font-size:18px;

color:#aaa;

}

.profile-bio{

margin-top:14px;

font-size:15px;

line-height:1.8;

color:#ddd;

max-width:520px;

margin-left:auto;
margin-right:auto;

}
/* ===========================
   STATS
=========================== */

.stats{

display:flex;
justify-content:space-between;
align-items:center;

margin-top:30px;
padding:18px 12px;

background:rgba(255,255,255,.05);
backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.08);

border-radius:20px;

box-shadow:
0 0 20px rgba(0,170,255,.12);

}

.stat{

flex:1;
text-align:center;

}

.stat-number{

font-size:28px;
font-weight:bold;
color:#fff;

}

.stat-text{

margin-top:6px;
font-size:14px;
color:#9e9e9e;

}

/* ===========================
   BUTTONS
=========================== */

.buttons{

display:flex;
gap:12px;

justify-content:center;
flex-wrap:wrap;

margin-top:25px;

}

.buttons button,
.buttons a{

padding:13px 22px;

border:none;
outline:none;

border-radius:14px;

background:linear-gradient(
135deg,
#00aaff,
#0066ff
);

color:#fff;
font-weight:bold;
font-size:15px;

text-decoration:none;

cursor:pointer;

transition:.35s;

box-shadow:
0 8px 20px rgba(0,170,255,.25);

}

.buttons button:hover,
.buttons a:hover{

transform:translateY(-3px);

box-shadow:
0 14px 30px rgba(0,170,255,.45);

}

#editProfileBtn{

background:linear-gradient(
135deg,
#444,
#222
);

}

#messageBtn{

background:linear-gradient(
135deg,
#444,
#222
);

}

/* ===========================
   STORIES ROW
=========================== */

.stories-wrapper{

margin-top:28px;

display:flex;
gap:16px;

overflow-x:auto;

padding:5px 4px 15px;

scrollbar-width:none;

}

.stories-wrapper::-webkit-scrollbar{

display:none;

}

.story-item{

min-width:82px;

text-align:center;

animation:fadeStory .5s ease;

}

@keyframes fadeStory{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:none;

}

}

.story-circle{

width:74px;
height:74px;

margin:auto;

padding:3px;

border-radius:50%;

background:linear-gradient(
45deg,
#ff0066,
#ff9800,
#00aaff
);

display:flex;
align-items:center;
justify-content:center;

}

.story-circle img{

width:66px;
height:66px;

border-radius:50%;

border:3px solid #111;

object-fit:cover;

}

.story-name{

margin-top:7px;

font-size:13px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

}

/* ===========================
   SECTION TITLE
=========================== */

.section-title{

margin-top:28px;
margin-bottom:14px;

font-size:22px;
font-weight:bold;

}

/* ===========================
   TABS
=========================== */

.profile-tabs{

display:flex;

justify-content:space-between;

gap:10px;

margin-top:18px;

overflow-x:auto;

padding-bottom:10px;

scrollbar-width:none;

}

.profile-tabs::-webkit-scrollbar{

display:none;

}

.profile-tab{

min-width:95px;

padding:12px;

text-align:center;

border-radius:12px;

background:#1b1b1b;

color:#bbb;

font-size:15px;
font-weight:bold;

cursor:pointer;

transition:.3s;

}

.profile-tab.active{

background:linear-gradient(
135deg,
#00aaff,
#0066ff
);

color:#fff;

box-shadow:
0 0 18px rgba(0,170,255,.35);

}

.profile-tab:hover{

transform:translateY(-2px);

}

/* ===========================
   CONTENT AREA
=========================== */

.tab-content{

margin-top:22px;

animation:fadeContent .45s ease;

}

@keyframes fadeContent{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:none;

}
/* ===========================
   VIDEO / POST CARDS
=========================== */

.post-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

border-radius:20px;

overflow:hidden;

margin-bottom:20px;

box-shadow:
0 8px 25px rgba(0,0,0,.35);

transition:.35s;

animation:cardFade .5s ease;

}

.post-card:hover{

transform:translateY(-6px);

box-shadow:
0 15px 35px rgba(0,170,255,.18);

}

@keyframes cardFade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:none;

}

}

.post-card img,
.post-card video{

width:100%;
display:block;
border-radius:18px;

}

.post-info{

padding:16px;

}

.post-title{

font-size:18px;
font-weight:bold;

margin-bottom:8px;

}

.post-desc{

color:#bbb;

line-height:1.6;

font-size:14px;

}

/* ===========================
   SHORTS GRID
=========================== */

.shorts-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:14px;

}

.short-card{

background:#181818;

border-radius:18px;

overflow:hidden;

transition:.3s;

}

.short-card:hover{

transform:scale(1.03);

}

.short-card video{

width:100%;
height:250px;

object-fit:cover;

}

.short-title{

padding:10px;

font-size:14px;

}

/* ===========================
   SAVED POSTS
=========================== */

.saved-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:14px;

}

.saved-card{

background:#181818;

border-radius:18px;

overflow:hidden;

transition:.3s;

}

.saved-card:hover{

transform:translateY(-5px);

}

.saved-card img{

width:100%;

height:170px;

object-fit:cover;

}

/* ===========================
   FLOATING CHAT
=========================== */

#floatingChat{

position:fixed;

right:20px;
bottom:95px;

width:68px;
height:68px;

border:none;

border-radius:50%;

background:

linear-gradient(
135deg,
#00aaff,
#0066ff
);

font-size:30px;

color:#fff;

cursor:pointer;

z-index:999;

box-shadow:

0 0 25px rgba(0,170,255,.45);

animation:chatPulse 2s infinite;

}

@keyframes chatPulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.08);

box-shadow:

0 0 40px rgba(0,170,255,.7);

}

100%{

transform:scale(1);

}

}

/* ===========================
   LOADER
=========================== */

#pageLoader{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#0b0b0b;

display:flex;

justify-content:center;
align-items:center;
flex-direction:column;

z-index:99999;

}

.loaderLogo{

width:90px;
height:90px;

border-radius:50%;

background:

linear-gradient(
135deg,
#00aaff,
#0066ff
);

display:flex;

justify-content:center;
align-items:center;

font-size:42px;

animation:spinLogo 2s linear infinite;

}

@keyframes spinLogo{

100%{

transform:rotate(360deg);

}

}

.loaderText{

margin-top:20px;

font-size:28px;

font-weight:bold;

color:#00aaff;

}

/* ===========================
   PREMIUM NAVIGATION
=========================== */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;
height:72px;

background:rgba(20,20,20,.95);

backdrop-filter:blur(15px);

display:flex;

justify-content:space-around;
align-items:center;

border-top:1px solid rgba(255,255,255,.08);

z-index:999;

}

.bottom-nav a{

color:#888;

text-decoration:none;

display:flex;

flex-direction:column;

align-items:center;

font-size:12px;

transition:.3s;

}

.bottom-nav a.active{

color:#00aaff;

}

.bottom-nav a:hover{

transform:translateY(-3px);

}

.nav-icon{

font-size:24px;

margin-bottom:5px;

}
</style>

</head>

<body>

<!-- Loading Screen -->

<div id="pageLoader">

<div class="loaderLogo">

👤

</div>

<div class="loaderText">

Viewora

</div>

</div>

<!-- Banner -->

<div class="profile-banner">

<img id="coverPhoto" src="banner.jpg">

<button class="settings-btn"
onclick="location.href='settings.html'">

⚙️

</button>

</div>

<!-- Profile -->

<div class="profile-card">

<div id="storyRing">

<img id="profilePic" src="users.jpg">

<div class="add-story"
onclick="createStory()">

+

</div>

</div>

<h1 class="profile-name">

<span id="profileName">
Loading...
</span>

<span id="verifiedBadge" class="verified" style="display:none;">
✔️
</span>

</h1>

<div
id="profileUsername"
class="profile-username">

@loading

</div>

<p
id="profileBio"
class="profile-bio">

Loading profile...

</p>

<!-- Stats -->

<div class="stats">

<div class="stat">

<div id="postsCount"
class="stat-number">

0

</div>

<div class="stat-text">

Posts

</div>

</div>

<div class="stat">

<div id="followersCount"
class="stat-number">

0

</div>

<div class="stat-text">

Followers

</div>

</div>

<div class="stat">

<div id="followingCount"
class="stat-number">

0

</div>

<div class="stat-text">

Following

</div>

</div>

<div class="stat">

<div id="videosCount"
class="stat-number">

0

</div>

<div class="stat-text">

Videos

</div>

</div>

</div>

<!-- Buttons -->

<div class="buttons">

<button id="followBtn">

Follow

</button>

<a
id="editProfileBtn"
href="edit-profile.html">

Edit Profile

</a>

<button
id="messageBtn"
onclick="openChat()">

💬 Message

</button>

</div>

<!-- Tabs -->

<div class="profile-tabs">

<div class="profile-tab active">

🎥 Videos

</div>

<div class="profile-tab">

▶ Shorts

</div>

<div class="profile-tab">

📝 Posts

</div>

<div class="profile-tab">

❤️ Saved

</div>

</div>

<div class="tab-content">

<div id="videosList"></div>

<div id="shortsList"></div>

<div id="profilePosts"></div>

<div id="savedPosts"></div>

</div>

</div>

<!-- Floating Chat -->

<button
id="floatingChat"
onclick="location.href='messages.html'">

💬

</button>

<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="index.html">

<div class="nav-icon">🏠</div>

Home

</a>

<a href="shorts.html">

<div class="nav-icon">▶</div>

Shorts

</a>

<a href="users.html">

<div class="nav-icon">👥</div>

Userslist

</a>

<a href="profile.html"
class="active">

<div class="nav-icon">👤</div>

Profile

</a>

</div>

<input
type="file"
id="storyFile"
accept="image/*,video/*"
hidden>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="firebase.js"></script>
<script src="profile.js"></script>
<script src="nav.js"></script>

<script>

window.addEventListener("load",()=>{

setTimeout(()=>{

const loader=document.getElementById("pageLoader");

loader.style.opacity="0";

setTimeout(()=>{

loader.remove();

},500);

},900);

});

</script>

</body>
</html>
