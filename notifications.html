<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora • Notifications</title>

<meta name="theme-color"
content="#4f46e5">

<link rel="stylesheet"
href="notifications.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- ========================= -->
<!-- Animated Background -->
<!-- ========================= -->

<div class="bgGradient"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- ========================= -->
<!-- Premium Loader -->
<!-- ========================= -->

<div id="loading" class="loadingScreen">

<div class="loaderCircle"></div>

<h2>Loading Notifications...</h2>

<p>Please wait</p>

</div>

<!-- ========================= -->
<!-- Main App -->
<!-- ========================= -->

<div id="app">

<!-- ========================= -->
<!-- Header -->
<!-- ========================= -->

<header class="header glass">

<button
class="iconBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>

Notifications

</h2>

<div class="headerRight">

<button
id="reloadNotifications"
class="iconBtn">

<i class="fa-solid fa-rotate"></i>

</button>

<button
onclick="markAllNotificationsRead()"
class="iconBtn">

<i class="fa-solid fa-check-double"></i>

</button>

<button
onclick="clearAllNotifications()"
class="iconBtn danger">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</header>

<!-- ========================= -->
<!-- Search -->
<!-- ========================= -->

<div class="searchArea">

<i class="fa-solid fa-magnifying-glass"></i>

<input
id="notificationSearch"
type="text"
placeholder="Search notifications...">

</div>

<!-- ========================= -->
<!-- Notification Badge -->
<!-- ========================= -->

<div class="topInfo">

<div class="badgeCard glass">

<span>

Unread

</span>

<div
id="notificationBadge"
class="badge">

0

</div>

</div>

</div>
<!-- ========================= -->
<!-- Notifications Container -->
<!-- ========================= -->

<main id="notificationsPage">

    <!-- Notifications will load here -->

    <div id="notificationsList"></div>

</main>

<!-- ========================= -->
<!-- Empty State -->
<!-- ========================= -->

<div
id="emptyNotifications"
class="emptyState hidden">

    <div class="emptyIcon">

        <i class="fa-regular fa-bell-slash"></i>

    </div>

    <h2>

        No Notifications

    </h2>

    <p>

        Likes, comments, follows and
        messages will appear here.

    </p>

</div>

<!-- ========================= -->
<!-- Scroll To Top -->
<!-- ========================= -->

<button
id="scrollTopBtn"
class="fab hidden">

    <i class="fa-solid fa-arrow-up"></i>

</button>

<!-- ========================= -->
<!-- Premium Toast -->
<!-- ========================= -->

<div
id="toast"
class="toast">

    <i
    class="fa-solid fa-circle-check">

    </i>

    <span>

        Success

    </span>

</div>

<!-- ========================= -->
<!-- Floating Button -->
<!-- ========================= -->

<button
id="floatingAction"
class="fabAction">

    <i
    class="fa-solid fa-bell">

    </i>

</button>

<!-- ========================= -->
<!-- Loading Overlay -->
<!-- ========================= -->

<div
id="overlayLoading"
class="overlay hidden">

    <div class="spinner"></div>

    <p>

        Please wait...

    </p>

</div>

<!-- ========================= -->
<!-- Bottom Navigation -->
<!-- ========================= -->

<nav class="bottomNav glass">

    <a href="index.html">

        <i class="fa-solid fa-house"></i>

        <span>Home</span>

    </a>

    <a href="shorts.html">

        <i class="fa-solid fa-play"></i>

        <span>Shorts</span>

    </a>

    <a href="upload.html">

        <i class="fa-solid fa-plus"></i>

        <span>Create</span>

    </a>

    <a
    href="notifications.html"
    class="active">

        <i class="fa-solid fa-bell"></i>

        <span>Notifications</span>

    </a>

    <a href="profile.html">

        <i class="fa-solid fa-user"></i>

        <span>Profile</span>

    </a>

</nav>
<!-- ========================= -->
<!-- Firebase SDK -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- ========================= -->
<!-- App Files -->
<!-- ========================= -->

<script src="firebase.js"></script>
<script src="notifications.js"></script>

<!-- ========================= -->
<!-- Premium Animation -->
<!-- ========================= -->

<script>

// ===============================
// Fade In
// ===============================

window.addEventListener("load",()=>{

    const loading =
    document.getElementById("loading");

    const app =
    document.getElementById("app");

    if(loading){

        setTimeout(()=>{

            loading.style.opacity="0";

            setTimeout(()=>{

                loading.remove();

                app.style.opacity="1";

            },400);

        },700);

    }

});

// ===============================
// Scroll Button
// ===============================

const topBtn =
document.getElementById("scrollTopBtn");

window.addEventListener("scroll",()=>{

    if(window.scrollY>350){

        topBtn.classList.remove("hidden");

    }else{

        topBtn.classList.add("hidden");

    }

});

topBtn.onclick=()=>{

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

};

// ===============================
// Floating Button
// ===============================

const fab =
document.getElementById("floatingAction");

if(fab){

    fab.onclick=()=>{

        window.scrollTo({

            top:0,

            behavior:"smooth"

        });

    };

}

// ===============================
// Online / Offline
// ===============================

window.addEventListener("online",()=>{

    if(typeof showToast==="function"){

        showToast("🌐 Connected");

    }

});

window.addEventListener("offline",()=>{

    if(typeof showToast==="function"){

        showToast("📡 No Internet");

    }

});

// ===============================
// Pull To Refresh
// ===============================

let startY=0;

window.addEventListener("touchstart",e=>{

    startY=e.touches[0].clientY;

});

window.addEventListener("touchend",e=>{

    const endY=e.changedTouches[0].clientY;

    if(endY-startY>150){

        if(typeof refreshNotifications==="function"){

            refreshNotifications();

        }

    }

});

// ===============================
// Ripple Effect
// ===============================

document.addEventListener("click",e=>{

    const btn =
    e.target.closest("button");

    if(!btn) return;

    const ripple =
    document.createElement("span");

    ripple.className="ripple";

    ripple.style.left=e.offsetX+"px";

    ripple.style.top=e.offsetY+"px";

    btn.appendChild(ripple);

    setTimeout(()=>{

        ripple.remove();

    },600);

});

// ===============================

console.log("✅ Notifications Page Ready");

</script>

</body>
</html>
