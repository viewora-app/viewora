<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora • Notifications</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0b0b0b;
color:#fff;
min-height:100vh;
padding-bottom:90px;
overflow-x:hidden;

}

/* ===========================
   Animated Background
=========================== */

body::before{

content:"";

position:fixed;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:

radial-gradient(circle,#00aaff22,transparent 35%),

radial-gradient(circle,#ff00aa22,transparent 35%),

radial-gradient(circle,#00ff8822,transparent 35%);

animation:bgRotate 18s linear infinite;

z-index:-2;

}

@keyframes bgRotate{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* ===========================
   Header
=========================== */

.notification-header{

position:sticky;

top:0;

z-index:999;

height:75px;

display:flex;

align-items:center;

justify-content:center;

background:rgba(20,20,20,.85);

backdrop-filter:blur(15px);

border-bottom:1px solid rgba(255,255,255,.08);

box-shadow:0 5px 20px rgba(0,0,0,.35);

}

.notification-header h1{

font-size:24px;

background:linear-gradient(90deg,#00aaff,#00ffee);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

letter-spacing:1px;

}

/* ===========================
   Notification List
=========================== */

#notificationsList{

padding:18px;

}

/* ===========================
   Notification Card
=========================== */

.notif-card{

display:flex;

align-items:center;

gap:15px;

background:rgba(30,30,30,.9);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.05);

border-radius:18px;

padding:15px;

margin-bottom:15px;

transition:.3s;

animation:fadeUp .4s ease;

}

.notif-card:hover{

transform:translateY(-4px);

box-shadow:0 10px 25px rgba(0,170,255,.18);

}

/* Avatar */

.notif-avatar{

width:60px;

height:60px;

border-radius:50%;

object-fit:cover;

border:2px solid #00aaff;

box-shadow:0 0 15px rgba(0,170,255,.35);

}

/* Content */

.notif-content{

flex:1;

}

.notif-title{

font-size:16px;

font-weight:bold;

margin-bottom:5px;

}

.notif-text{

font-size:14px;

color:#cfcfcf;

line-height:1.5;

}

.notif-time{

font-size:12px;

color:#888;

margin-top:8px;

}

/* Notification Icon */

.notif-icon{

font-size:28px;

}

/* Animation */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<!-- Header -->

<div class="notification-header">

<h1>🔔 Notifications</h1>

</div>

<!-- Notifications -->

<div id="notificationsList">

<!-- notifications.js will load cards here -->

</div>
<!-- ===========================
     Empty State
=========================== -->

<div id="emptyNotifications" class="empty-box">

<div class="empty-icon">
🔔
</div>

<h2>No Notifications Yet</h2>

<p>
When someone likes, comments, follows,
or sends you a message, you'll see it here.
</p>

</div>

<!-- ===========================

=========================== -->

<button id="floatingChat"
onclick="location.href='messages.html'">

💬

=========================== -->

<div class="bottom-nav">

<span class="nav-icon">🏠</span>

Home

<!-- ===========================
     Part 2 CSS
=========================== -->

<style>

/* Empty */

.empty-box{

text-align:center;

padding:90px 25px;

animation:fadeUp .8s ease;

}

.empty-icon{

font-size:75px;

margin-bottom:20px;

animation:ring 2s infinite;

}

.empty-box h2{

font-size:25px;

margin-bottom:12px;

}

.empty-box p{

color:#9a9a9a;

font-size:15px;

line-height:1.7;

max-width:320px;

margin:auto;

}

/* Bell Animation */

@keyframes ring{

0%{transform:rotate(0deg);}
15%{transform:rotate(12deg);}
30%{transform:rotate(-12deg);}
45%{transform:rotate(8deg);}
60%{transform:rotate(-8deg);}
75%{transform:rotate(4deg);}
100%{transform:rotate(0deg);}

}

/* Floating Chat */

#floatingChat{

position:fixed;

right:20px;

bottom:95px;

width:62px;

height:62px;

border:none;

border-radius:50%;

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

font-size:28px;

cursor:pointer;

box-shadow:

0 10px 25px rgba(0,170,255,.45);

transition:.3s;

animation:float 2.5s infinite;

z-index:999;

}

#floatingChat:hover{

transform:scale(1.08);

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}

}

/* Bottom Navigation */

.bottom-nav{

position:fixed;

left:0;

right:0;

bottom:0;

height:72px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(20,20,20,.95);

backdrop-filter:blur(18px);

border-top:1px solid rgba(255,255,255,.08);

z-index:999;

}

.bottom-nav a{

text-decoration:none;

color:#a0a0a0;

font-size:12px;

text-align:center;

transition:.3s;

}

.bottom-nav a:hover{

color:#00aaff;

transform:translateY(-3px);

}

.bottom-nav a.active{

color:#00aaff;

font-weight:bold;

}

.nav-icon{

display:block;

font-size:22px;

margin-bottom:4px;

}

</style>

<!-- ===========================
     Premium Animation Script
=========================== -->

<script>

// ==========================
// Page Fade Animation
// ==========================

document.body.style.opacity="0";

window.addEventListener("load",()=>{

document.body.style.transition="opacity .45s";

document.body.style.opacity="1";

});

// ==========================
// Notification Card Animation
// ==========================

function animateCards(){

const cards=document.querySelectorAll(".notif-card");

cards.forEach((card,index)=>{

card.style.opacity="0";
card.style.transform="translateY(25px)";

setTimeout(()=>{

card.style.transition=".4s";

card.style.opacity="1";

card.style.transform="translateY(0)";

},index*80);

});

}

// ==========================
// Ripple Effect
// ==========================

document.addEventListener("click",(e)=>{

const target=e.target.closest("button,.notif-card,a");

if(!target) return;

const ripple=document.createElement("span");

ripple.style.position="absolute";
ripple.style.width="10px";
ripple.style.height="10px";
ripple.style.borderRadius="50%";
ripple.style.background="rgba(255,255,255,.35)";
ripple.style.left=e.offsetX+"px";
ripple.style.top=e.offsetY+"px";
ripple.style.transform="scale(0)";
ripple.style.transition=".55s";

target.style.position="relative";
target.style.overflow="hidden";

target.appendChild(ripple);

requestAnimationFrame(()=>{

ripple.style.transform="scale(30)";
ripple.style.opacity="0";

});

setTimeout(()=>{

ripple.remove();

},550);

});

// ==========================
// Pull To Refresh
// ==========================

let startY=0;

window.addEventListener("touchstart",(e)=>{

startY=e.touches[0].clientY;

});

window.addEventListener("touchend",(e)=>{

let endY=e.changedTouches[0].clientY;

if(endY-startY>120){

location.reload();

}

});

// ==========================
// Auto Refresh
// ==========================

setInterval(()=>{

if(typeof loadNotifications==="function"){

loadNotifications();

}

},30000);

// ==========================

window.addEventListener("load",()=>{

animateCards();

});

// ==========================

console.log("✅ Viewora Notifications Part 3 Loaded");

</script>
<script>

// ===========================
// Show / Hide Empty State
// ===========================

function checkEmptyNotifications(){

const list=document.getElementById("notificationsList");
const empty=document.getElementById("emptyNotifications");

if(!list || !empty) return;

const cards=list.querySelectorAll(".notif-card");

if(cards.length>0){

empty.style.display="none";

}else{

empty.style.display="block";

}

}

// ===========================
// Smooth Scroll
// ===========================

window.addEventListener("load",()=>{

window.scrollTo({
top:0,
behavior:"smooth"
});

});

// ===========================
// Internet Status
// ===========================

window.addEventListener("online",()=>{

console.log("✅ Internet Connected");

});

window.addEventListener("offline",()=>{

alert("No Internet Connection");

});

// ===========================
// Refresh Empty State
// ===========================

setInterval(checkEmptyNotifications,1000);

// ===========================
// Floating Button Animation
// ===========================

const floatingBtn=document.getElementById("floatingChat");

if(floatingBtn){

floatingBtn.addEventListener("click",()=>{

floatingBtn.style.transform="scale(.9)";

setTimeout(()=>{

floatingBtn.style.transform="scale(1)";

},150);

});

}

// ===========================

console.log("✅ Viewora Notifications V4 Loaded");

</script>

</body>
