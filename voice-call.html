<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora Voice Call</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#fff;

}

.bg{

position:fixed;
inset:0;

background:
linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#203a43);

background-size:400% 400%;

animation:bgMove 10s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

position:relative;
z-index:10;
text-align:center;
width:100%;
padding:25px;

}

.avatar{

width:170px;
height:170px;

border-radius:50%;

object-fit:cover;

border:5px solid rgba(255,255,255,.2);

box-shadow:0 0 40px rgba(255,255,255,.2);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}

}

h2{

margin-top:22px;

font-size:30px;

}

#callStatus{

margin-top:10px;

font-size:18px;

opacity:.9;

}

#callTimer{

margin-top:8px;

font-size:17px;

opacity:.8;

}

.wave{

display:flex;

justify-content:center;

gap:8px;

margin-top:35px;

}

.wave span{

width:7px;

height:35px;

background:#00ff99;

border-radius:20px;

animation:wave .8s infinite;

}

.wave span:nth-child(2){animation-delay:.1s;}
.wave span:nth-child(3){animation-delay:.2s;}
.wave span:nth-child(4){animation-delay:.3s;}
.wave span:nth-child(5){animation-delay:.4s;}

@keyframes wave{

0%,100%{

height:18px;

}

50%{

height:48px;

}

}

.controls{

position:absolute;

bottom:55px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:28px;

}

.controls button{

width:72px;

height:72px;

border:none;

border-radius:50%;

font-size:28px;

cursor:pointer;

transition:.25s;

}

#muteBtn{
background:#2196F3;
color:#fff;
}

#speakerBtn{

background:#9C27B0;
color:#fff;

}

#endCall{

background:#F44336;
color:#fff;

}

.controls button:active{

transform:scale(.92);

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<img
id="callerPhoto"
class="avatar"
src="assets/default-avatar.png">

<h2 id="callerName">

Connecting...

</h2>

<div id="callStatus">

Voice Call

</div>

<div id="callTimer">

00:00

</div>

<div class="wave">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

</div>

<div class="controls">

<button id="muteBtn">

🎤

</button>

<button id="speakerBtn">

🔊

</button>

<button id="endCall">

📞

</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="firebase.js"></script>

<script src="voice-call.js"></script>

</body>
</html>
