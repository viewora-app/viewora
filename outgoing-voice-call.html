<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calling • Viewora</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(135deg,#0f172a,#111827,#020617);

color:white;

}

/* Animated Background */

body::before{

content:"";

position:absolute;

width:220%;

height:220%;

background:
radial-gradient(circle,#00ff9966 8%,transparent 35%),
radial-gradient(circle,#00e5ff44 8%,transparent 35%);

animation:bgMove 12s linear infinite;

}

@keyframes bgMove{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

/* Card */

.card{

position:relative;

z-index:5;

width:360px;

padding:35px;

text-align:center;

border-radius:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 50px rgba(0,0,0,.45);

}

/* Avatar */

.avatar{

width:170px;

height:170px;

border-radius:50%;

object-fit:cover;

border:5px solid white;

animation:pulse 1.8s infinite;

}

@keyframes pulse{

0%{

transform:scale(1);

box-shadow:0 0 0 0 rgba(0,255,153,.8);

}

70%{

box-shadow:0 0 0 35px rgba(0,255,153,0);

}

100%{

transform:scale(1);

}

}

h2{

margin-top:20px;

font-size:28px;

}

.status{

margin-top:10px;

font-size:18px;

color:#7CFC00;

animation:blink 1s infinite;

}

@keyframes blink{

50%{

opacity:.3;

}

}

/* Calling Dots */

.dots{

margin-top:20px;

font-size:28px;

letter-spacing:5px;

animation:dots 1.5s infinite;

}

@keyframes dots{

0%{opacity:.2;}

50%{opacity:1;}

100%{opacity:.2;}

}

/* Cancel */

.cancel{

margin-top:40px;

width:90px;

height:90px;

border:none;

border-radius:50%;

background:#ff1744;

color:white;

font-size:36px;

cursor:pointer;

box-shadow:0 0 25px #ff1744;

transition:.25s;

}

.cancel:hover{

transform:scale(1.1);

}

</style>

</head>

<body>

<div class="card">

<img
id="receiverPhoto"
class="avatar"
src="assets/avatar.png">

<h2 id="receiverName">

Viewora User

</h2>

<div class="status">

Calling...

</div>

<div class="dots">

● ● ●

</div>

<button
id="cancelCall"
class="cancel">

📞

</button>

</div>

<script src="outgoing-voice-call.js"></script>

</body>
</html>
