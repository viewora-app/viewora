<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vieworation - Viewora</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .create-post {
            background: #1b1b1b;
            margin: 15px;
            padding: 20px;
            border-radius: 16px;
        }
        textarea, input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            background: #2a2a2a;
            color: white;
            border: none;
        }
        .post {
            background: #1b1b1b;
            margin: 15px;
            padding: 18px;
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <div class="create-post">
        <h2>Create Post</h2>
        <textarea id="postText" rows="3" placeholder="What's happening?"></textarea>
        <input id="imageUrl" type="text" placeholder="Paste image URL (optional)">
        
        <button onclick="createPost()" style="width:100%; padding:14px; background:#00aaff; color:white; border:none; border-radius:12px; margin-top:10px;">
            🚀 Post Now
        </button>
    </div>

    <div id="postsList"></div>

    </div>
