    <style>
        .create-post {
            background: #1b1b1b;
            margin: 15px;
            padding: 20px;
            border-radius: 16px;
        }
        textarea, input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            background: #2a2a2a;
            color: white;
            border: none;
        }
        .post {
            background: #1b1b1b;
            margin: 15px;
            padding: 18px;
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <div class="create-post">
        <h2>Create Post</h2>
        <textarea id="postText" rows="3" placeholder="What's happening?"></textarea>
        <input id="imageUrl" type="text" placeholder="Paste image URL (optional)">
        
        <button onclick="createPost()" style="width:100%; padding:14px; background:#00aaff; color:white; border:none; border-radius:12px; margin-top:10px;">
            🚀 Post Now
        </button>
    </div>

<style>
  #floatingChat{
    animation: pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow{

    0%,100%{
        transform: scale(1);
        box-shadow:
            0 8px 25px rgba(0,170,255,.35),
            0 0 12px rgba(0,170,255,.25);
    }

    50%{
        transform: scale(1.05);
        box-shadow:
            0 12px 35px rgba(0,170,255,.55),
            0 0 25px rgba(0,170,255,.45);
    }

}
</style>

    💬
