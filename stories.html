<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora Stories</title>

<link
rel="stylesheet"
href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f0f0f;
color:#fff;
overflow-x:hidden;
padding-bottom:90px;

}

/* Background */

body::before{

content:"";

position:fixed;

top:-50%;

left:-50%;

width:200%;

height:200%;

background:

radial-gradient(circle,#00aaff22,transparent 40%),

radial-gradient(circle,#ff00aa22,transparent 35%);

animation:bgMove 15s linear infinite;

z-index:-1;

}

@keyframes bgMove{

0%{transform:rotate(0deg);}

100%{transform:rotate(360deg);}

}

/* Header */

.header{

position:sticky;

top:0;

background:#161616ee;

backdrop-filter:blur(15px);

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid #2a2a2a;

z-index:100;

}

.logo{

font-size:26px;

font-weight:bold;

background:linear-gradient(90deg,#00aaff,#ff00aa);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.uploadBtn{

background:linear-gradient(135deg,#00aaff,#0077ff);

border:none;

color:white;

padding:12px 22px;

border-radius:30px;

cursor:pointer;

font-size:15px;

font-weight:bold;

transition:.3s;

}

.uploadBtn:hover{

transform:scale(1.05);

}

/* Story Ring */

.story-ring{

width:110px;

height:110px;

margin:30px auto;

padding:4px;

border-radius:50%;

background:linear-gradient(

45deg,

#ff0066,

#ffcc00,

#00aaff

);

display:flex;

justify-content:center;

align-items:center;

animation:ringGlow 2s infinite;

cursor:pointer;

}

@keyframes ringGlow{

0%,100%{

box-shadow:0 0 15px #00aaff;

}

50%{

box-shadow:0 0 35px #ff00aa;

}

}

.story-ring img{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

border:4px solid #111;

}

/* Upload Card */

.upload-card{

width:94%;

max-width:520px;

margin:20px auto;

background:#1a1a1a;

border-radius:22px;

padding:20px;

border:1px solid #2f2f2f;

box-shadow:

0 10px 35px rgba(0,0,0,.35);

}

.upload-title{

font-size:20px;

font-weight:bold;

margin-bottom:15px;

}

.upload-sub{

font-size:14px;

color:#aaa;

margin-bottom:18px;

}

/* Preview */

#storyPreview{

width:100%;

min-height:240px;

border:2px dashed #444;

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:#888;

transition:.3s;

}

#storyPreview.drag-active{

border-color:#00aaff;

background:#151f28;

}

</style>

</head>

<body>

<!-- Header -->

<div class="header">

<div class="logo">

Viewora Stories

</div>

<button

class="uploadBtn"

onclick="openStoryGallery()">

➕ Add Story

</button>

</div>

<!-- Story Ring -->

<div

id="storyRing"

class="story-ring"

onclick="viewStories()">

<img

id="storyProfile"

src="non.jpg"

alt="Story">

</div>

<!-- Upload Card -->

<div class="upload-card">

<div class="upload-title">

Share your Story

</div>

<div class="upload-sub">

Photos and videos disappear after 24 hours.

</div>

<!-- Hidden File Picker -->

<input

type="file"

id="storyFile"

accept="image/*,video/*"

hidden>

<!-- Preview -->

<div id="storyPreview">

Select a photo or video

</div>
<!-- ========================================= -->
<!-- STORY VIEWER -->
<!-- ========================================= -->

<div id="storyViewer" class="story-viewer">

    <!-- Close Button -->
    <button
        class="story-close"
        onclick="closeStoryViewer()">
        ✕
    </button>

    <!-- Progress -->
    <div
        id="storyProgress"
        class="story-progress">
    </div>

    <!-- Header -->
    <div class="story-top">

        <img
            id="storyUserPhoto"
            class="story-user-photo"
            src="non.jpg">

        <div class="story-user-info">

            <div id="storyUserName">
                User
            </div>

            <div id="storyTime">
                Just now
            </div>

        </div>

    </div>

    <!-- Story Image -->

    <img
        id="storyImage"
        class="story-image"
        style="display:none;">

    <!-- Story Video -->

    <video
        id="storyVideo"
        class="story-video"
        style="display:none;"
        playsinline
        controls>
    </video>

    <!-- Left Tap -->

    <div
        class="story-left"
        onclick="prevStory()">
    </div>

    <!-- Right Tap -->

    <div
        class="story-right"
        onclick="nextStory()">
    </div>

    <!-- Bottom Info -->

    <div class="story-bottom">

        <div class="story-stats">

            <span id="storyViews">
                👁 0
            </span>

            <span id="storyReplies">
                💬 0
            </span>

            <span id="storyReactions">
                ❤️ 0
            </span>

        </div>

    </div>

</div>

<!-- ========================================= -->
<!-- STORY VIEWER CSS -->
<!-- ========================================= -->

<style>

.story-viewer{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:none;

justify-content:center;
align-items:center;

z-index:99999;

overflow:hidden;

}

/* Progress */

.story-progress{

position:absolute;

top:12px;
left:12px;
right:12px;

height:4px;

background:rgba(255,255,255,.15);

border-radius:20px;

overflow:hidden;

}

/* Close */

.story-close{

position:absolute;

top:18px;
right:18px;

width:42px;
height:42px;

border:none;

border-radius:50%;

background:rgba(0,0,0,.45);

color:#fff;

font-size:22px;

cursor:pointer;

z-index:20;

}

/* Header */

.story-top{

position:absolute;

top:30px;
left:18px;

display:flex;

align-items:center;

gap:12px;

z-index:15;

}

.story-user-photo{

width:46px;
height:46px;

border-radius:50%;

object-fit:cover;

border:2px solid #00aaff;

}

.story-user-info{

display:flex;

flex-direction:column;

}

#storyUserName{

font-size:16px;

font-weight:bold;

}

#storyTime{

font-size:12px;

color:#ccc;

}

/* Image */

.story-image{

width:100%;

height:100%;

object-fit:contain;

}

/* Video */

.story-video{

width:100%;

height:100%;

object-fit:contain;

background:#000;

}

/* Navigation */

.story-left,
.story-right{

position:absolute;

top:0;

width:50%;

height:100%;

z-index:5;

}

.story-left{

left:0;

}

.story-right{

right:0;

}

/* Bottom */

.story-bottom{

position:absolute;

bottom:30px;

left:20px;
right:20px;

display:flex;

justify-content:space-between;

align-items:center;

z-index:20;

}

.story-stats{

display:flex;

gap:18px;

font-size:15px;

background:rgba(0,0,0,.45);

padding:10px 18px;

border-radius:30px;

backdrop-filter:blur(12px);

}

</style>
<!-- ========================================= -->
<!-- UPLOAD SECTION -->
<!-- ========================================= -->

<div class="upload-card">

    <div id="storyPreview">

        Select a Photo or Video

    </div>

    <!-- Progress -->

    <div
        id="uploadProgressBox"
        class="upload-progress-box">

        <div
            id="uploadProgressFill"
            class="upload-progress-fill">
        </div>

    </div>

    <div
        id="uploadPercent"
        class="upload-percent">

        0%

    </div>

    <!-- Buttons -->

    <div class="upload-actions">

        <button
            class="story-btn"
            onclick="document.getElementById('storyFile').click()">

            📁 Choose

        </button>

        <button
            class="story-btn primary"
            onclick="uploadStory()">

            🚀 Upload

        </button>

    </div>

</div>

<!-- ========================================= -->
<!-- STORY REPLY -->
<!-- ========================================= -->

<div class="story-reply">

    <input
        id="storyReplyInput"
        type="text"
        placeholder="Reply to story...">

    <button
        onclick="sendStoryReply()">

        ➤

    </button>

</div>

<!-- ========================================= -->
<!-- STORY REACTIONS -->
<!-- ========================================= -->

<div class="story-reactions">

    <button onclick="reactStory('❤️')">❤️</button>

    <button onclick="reactStory('🔥')">🔥</button>

    <button onclick="reactStory('😂')">😂</button>

    <button onclick="reactStory('😮')">😮</button>

    <button onclick="reactStory('😍')">😍</button>

</div>

<!-- ========================================= -->
<!-- CSS -->
<!-- ========================================= -->

<style>

/* Progress */

.upload-progress-box{

margin-top:18px;

height:8px;

background:#2a2a2a;

border-radius:50px;

overflow:hidden;

display:none;

}

.upload-progress-fill{

width:0%;

height:100%;

background:linear-gradient(
90deg,
#00aaff,
#0077ff
);

transition:.25s;

}

.upload-percent{

margin-top:8px;

text-align:center;

font-size:13px;

color:#aaa;

display:none;

}

/* Buttons */

.upload-actions{

display:flex;

gap:15px;

margin-top:20px;

}

.story-btn{

flex:1;

padding:14px;

border:none;

border-radius:30px;

cursor:pointer;

font-size:15px;

font-weight:bold;

background:#222;

color:#fff;

transition:.3s;

}

.story-btn:hover{

transform:scale(1.03);

}

.story-btn.primary{

background:linear-gradient(
135deg,
#00aaff,
#0077ff
);

}

/* Reply */

.story-reply{

position:fixed;

bottom:85px;

left:15px;

right:15px;

display:flex;

gap:10px;

z-index:999;

}

.story-reply input{

flex:1;

padding:14px;

border:none;

outline:none;

border-radius:30px;

background:#1d1d1d;

color:#fff;

}

.story-reply button{

width:58px;

border:none;

border-radius:50%;

background:#00aaff;

color:#fff;

font-size:20px;

cursor:pointer;

}

/* Reactions */

.story-reactions{

position:fixed;

bottom:165px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:12px;

padding:10px 18px;

background:rgba(25,25,25,.9);

backdrop-filter:blur(12px);

border-radius:40px;

}

.story-reactions button{

background:none;

border:none;

font-size:24px;

cursor:pointer;

transition:.25s;

}

.story-reactions button:hover{

transform:scale(1.3);

}

</style>
<!-- ========================================= -->
<!-- LOADING OVERLAY -->
<!-- ========================================= -->

<div id="storyLoading" class="story-loading">

    <div class="story-spinner"></div>

    <p>Loading Story...</p>

</div>

<!-- ========================================= -->
<!-- FLOATING ADD STORY BUTTON -->
<!-- ========================================= -->

<button
id="floatingStory"

onclick="document.getElementById('storyFile').click()">

➕

</button>

<!-- ========================================= -->
<!-- PREMIUM CSS -->
<!-- ========================================= -->

<style>

/* Loading */

.story-loading{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

flex-direction:column;

background:rgba(0,0,0,.85);

backdrop-filter:blur(10px);

z-index:999999;

}

.story-spinner{

width:65px;

height:65px;

border:5px solid #333;

border-top:5px solid #00aaff;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.story-loading p{

margin-top:18px;

font-size:18px;

}

/* Floating Button */

#floatingStory{

position:fixed;

right:22px;

bottom:95px;

width:65px;

height:65px;

border:none;

border-radius:50%;

font-size:30px;

color:#fff;

cursor:pointer;

background:linear-gradient(
135deg,
#00aaff,
#0077ff
);

box-shadow:

0 10px 25px rgba(0,170,255,.45);

animation:float 2.5s infinite;

z-index:999;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

}

/* Bottom Nav */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

background:#161616ee;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #333;

backdrop-filter:blur(15px);

z-index:999;

}

.bottom-nav a{

text-decoration:none;

color:#bbb;

font-size:12px;

text-align:center;

transition:.3s;

}

.bottom-nav a.active{

color:#00aaff;

font-weight:bold;

}

.nav-icon{

display:block;

font-size:22px;

margin-bottom:4px;

}

.bottom-nav a:hover{

transform:translateY(-3px);

color:#00aaff;

}

</style>
