<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Viewora Stories</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:#fff;
overflow:hidden;

}

/* Viewer */

#storyViewer{

position:fixed;

top:0;
left:0;

width:100%;
height:100vh;

background:#000;

display:none;

z-index:9999;

}

/* Progress */

#storyProgress{

position:absolute;

top:15px;

left:15px;

right:15px;

display:flex;

gap:6px;

z-index:20;

}

/* Header */

.storyHeader{

position:absolute;

top:35px;

left:15px;

right:15px;

display:flex;

align-items:center;

justify-content:space-between;

z-index:20;

}

.storyUser{

display:flex;

align-items:center;

gap:12px;

}

.storyUser img{

width:45px;

height:45px;

border-radius:50%;

border:2px solid #00aaff;

object-fit:cover;

}

.storyUser h3{

font-size:16px;

}

.storyUser small{

color:#bbb;

}

/* Close */

.closeBtn{

font-size:34px;

cursor:pointer;

}

/* Image */

#storyImage{

width:100%;

height:100%;

display:none;

object-fit:contain;

}

/* Video */

#storyVideo{

width:100%;

height:100%;

display:none;

object-fit:contain;

background:#000;

}

/* Navigation */

.storyLeft{

position:absolute;

left:0;

top:0;

width:50%;

height:100%;

z-index:10;

}

.storyRight{

position:absolute;

right:0;

top:0;

width:50%;

height:100%;

z-index:10;

}

/* Bottom */

.storyBottom{

position:absolute;

bottom:20px;

left:15px;

right:15px;

display:flex;

gap:10px;

z-index:20;

}

.storyBottom input{

flex:1;

padding:12px;

border:none;

border-radius:30px;

outline:none;

}

.storyBottom button{

padding:12px 18px;

border:none;

border-radius:30px;

background:#00aaff;

color:#fff;

font-weight:bold;

cursor:pointer;

}

/* Upload */

.uploadStory{

position:fixed;

right:20px;

bottom:95px;

width:65px;

height:65px;

border-radius:50%;

background:linear-gradient(135deg,#00aaff,#0066ff);

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

cursor:pointer;

box-shadow:0 10px 30px rgba(0,170,255,.4);

animation:pulse 2s infinite;

z-index:100;

}

@keyframes pulse{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.08);

}

}

</style>

</head>

<body>

<!-- Upload Story -->

<div class="uploadStory"

onclick="createStory()">

+

</div>

<!-- Story Viewer -->

<div id="storyViewer">

<div id="storyProgress"></div>

<div class="storyHeader">

<div class="storyUser">

<img id="storyProfile"

src="non.jpg">

<div>

<h3 id="storyName">

User

</h3>

<small id="storyTime">

Just now

</small>

</div>

</div>

<div

class="closeBtn"

onclick="closeStoryViewer()">

✕

</div>

</div>

<img

id="storyImage">

<video

id="storyVideo"

playsinline>

</video>

<div

class="storyLeft"

onclick="prevStory()">

</div>

<div

class="storyRight"

onclick="nextStory()">

</div>

<div class="storyBottom">

<input

id="storyReply"

placeholder="Reply...">

<button

onclick="replyStory()">

Send

</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="stories.js"></script>

</body>

</html>
