<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat • Viewora</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #111;
            color: white;
            margin: 0;
            padding-bottom: 70px;
        }

        .chat-header {
            background: #1b1b1b;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 22px;
            color: #00aaff;
            text-decoration: none;
        }

        .chat-user-name {
            font-size: 18px;
            font-weight: 600;
        }

        .call-btn {
            background: #00cc88;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        .messages-container {
            padding: 16px;
            height: calc(100vh - 140px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.sent {
            background: #00aaff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.received {
            background: #2a2a2a;
            color: #eee;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1b1b1b;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        #messageInput {
            flex: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 15px;
        }

        .send-btn {
            background: #00aaff;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Chat Header -->
    <div class="chat-header">
        <div class="chat-header-left">
            <a href="javascript:history.back()" class="back-btn">←</a>
            <div>
                <div class="chat-user-name" id="chatUserName">Loading...</div>
            </div>
        </div>

        <button class="call-btn" onclick="startCall()">📞 Call</button>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer"></div>

    <!-- Input Area -->
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." 
               onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script src="firebase.js"></script>
    <script src="chat.js"></script>

</body>
</html>
