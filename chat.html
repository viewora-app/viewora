<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Viewora Chat</title>

<link rel="stylesheet" href="style.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:#0d0d0d;
color:#fff;
height:100vh;
overflow:hidden;

}

/* Animated Background */

body::before{

content:"";

position:fixed;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:

radial-gradient(circle,#00aaff22,transparent 35%),
radial-gradient(circle,#ff008822,transparent 35%),
radial-gradient(circle,#00ff8822,transparent 35%);

animation:bgRotate 18s linear infinite;

z-index:-2;

}

@keyframes bgRotate{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

/* Header */

.chat-header{

position:fixed;

top:0;
left:0;

width:100%;

height:75px;

background:rgba(20,20,20,.85);

backdrop-filter:blur(12px);

display:flex;

align-items:center;

padding:12px 15px;

border-bottom:1px solid rgba(255,255,255,.08);

z-index:100;

animation:slideDown .6s;

}

@keyframes slideDown{

from{

opacity:0;
transform:translateY(-50px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.back-btn{

font-size:28px;

cursor:pointer;

margin-right:12px;

transition:.3s;

}

.back-btn:hover{

transform:translateX(-5px);

}

.user-photo{

width:50px;

height:50px;

border-radius:50%;

object-fit:cover;

border:3px solid #00aaff;

box-shadow:0 0 15px #00aaff55;

}

.user-details{

margin-left:12px;

}

#chatUserName{

font-size:18px;

font-weight:bold;

}

#chatStatus{

font-size:13px;

color:#00ff66;

margin-top:2px;

}

/* Right Icons */

.header-icons{

margin-left:auto;

display:flex;

gap:18px;

font-size:22px;

}

.header-icons span{

cursor:pointer;

transition:.3s;

}

.header-icons span:hover{

transform:scale(1.2);

color:#00aaff;

}

/* Chat Area */

.chat-area{

margin-top:75px;

height:calc(100vh - 150px);

overflow-y:auto;

padding:15px;

scroll-behavior:smooth;

}

.chat-area::-webkit-scrollbar{

width:5px;

}

.chat-area::-webkit-scrollbar-thumb{

background:#00aaff;

border-radius:10px;

}

</style>

</head>

<body>

<!-- Header -->

<div class="chat-header">

<div class="back-btn"
onclick="history.back()">

⬅

</div>

<img
id="chatUserPhoto"
class="user-photo"
src="non.jpg">

<div class="user-details">

<div id="chatUserName">

Loading...

</div>

<div id="chatStatus">

🟢 Online

</div>

</div>

<div class="header-icons">

<span>📞</span>

<span>🎥</span>

<span>⋮</span>

</div>

</div>

<!-- Messages -->

<div
id="messagesContainer"
class="chat-area">

</div>
<!-- ========================= -->
<!-- Chat Styles -->
<!-- ========================= -->

<style>

/* Message Bubble */

.message{

max-width:78%;
padding:12px 16px;
margin:10px 0;
border-radius:20px;
word-wrap:break-word;
animation:pop .25s ease;

}

.sent{

margin-left:auto;

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

border-bottom-right-radius:8px;

box-shadow:0 5px 15px rgba(0,170,255,.25);

}

.received{

margin-right:auto;

background:#242424;

color:#fff;

border-bottom-left-radius:8px;

border:1px solid rgba(255,255,255,.05);

}

.message img{

width:100%;
border-radius:12px;
margin-top:8px;

}

.message video{

width:100%;
border-radius:12px;
margin-top:8px;

}

.message-time{

display:block;
font-size:11px;
opacity:.7;
margin-top:6px;
text-align:right;

}

/* Typing */

.typing-box{

display:none;

width:max-content;

background:#242424;

padding:10px 16px;

border-radius:18px;

margin:10px 0;

animation:pulse 1s infinite;

}

.typing-dot{

display:inline-block;

width:8px;
height:8px;

background:#00aaff;

border-radius:50%;

margin:0 2px;

animation:bounce .7s infinite;

}

.typing-dot:nth-child(2){

animation-delay:.15s;

}

.typing-dot:nth-child(3){

animation-delay:.3s;

}

@keyframes bounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-5px);

}

}

@keyframes pulse{

0%{

opacity:.5;

}

50%{

opacity:1;

}

100%{

opacity:.5;

}

}

@keyframes pop{

from{

transform:scale(.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

</style>

<!-- Typing Indicator -->

<div id="typingIndicator" class="typing-box">

<span class="typing-dot"></span>

<span class="typing-dot"></span>

<span class="typing-dot"></span>

</div>
<!-- ========================= -->
<!-- Chat Input Area -->
<!-- ========================= -->

<style>

.chat-input-area{

position:fixed;
left:0;
bottom:0;
width:100%;

background:rgba(20,20,20,.9);
backdrop-filter:blur(15px);

padding:12px;

display:flex;
align-items:center;
gap:10px;

border-top:1px solid rgba(255,255,255,.08);

z-index:100;

}

.icon-btn{

width:42px;
height:42px;

border:none;
border-radius:50%;

background:#252525;

color:#fff;

font-size:20px;

cursor:pointer;

transition:.3s;

display:flex;
align-items:center;
justify-content:center;

}

.icon-btn:hover{

background:#00aaff;
transform:scale(1.08);

}

#messageInput{

flex:1;

height:46px;

border:none;
outline:none;

padding:0 18px;

border-radius:30px;

background:#1f1f1f;

color:#fff;

font-size:15px;

}

#messageInput::placeholder{

color:#888;

}

.send-btn{

width:50px;
height:50px;

border:none;
border-radius:50%;

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

font-size:22px;

cursor:pointer;

transition:.3s;

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 0 15px rgba(0,170,255,.35);

}

.send-btn:hover{

transform:scale(1.08) rotate(10deg);

}

</style>

<!-- Input Bar -->

<div class="chat-input-area">

<button class="icon-btn" title="Emoji">
😊
</button>

<button class="icon-btn" title="Attachment">
📎
</button>

<button class="icon-btn" title="Camera">
📷
</button>

<input
type="text"
id="messageInput"
placeholder="Type a message...">

<button
class="send-btn"
onclick="sendMessage()">
➤
</button>

</div>

<!-- Hidden File Picker -->

<input
type="file"
id="chatFile"
accept="image/*,video/*"
hidden>
<!-- ========================= -->
<!-- Firebase -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- Viewora Scripts -->

<script src="firebase.js"></script>
<script src="chat.js"></script>
<script src="nav.js"></script>

<script>

// ===========================
// Auto Focus
// ===========================

window.addEventListener("load",()=>{

    const input=document.getElementById("messageInput");

    if(input){

        input.focus();

    }

});

// ===========================
// Ripple Effect
// ===========================

document.querySelectorAll("button").forEach(btn=>{

    btn.addEventListener("click",function(e){

        const ripple=document.createElement("span");

        ripple.style.position="absolute";
        ripple.style.width="10px";
        ripple.style.height="10px";
        ripple.style.borderRadius="50%";
        ripple.style.background="rgba(255,255,255,.4)";
        ripple.style.left=e.offsetX+"px";
        ripple.style.top=e.offsetY+"px";
        ripple.style.transform="scale(0)";
        ripple.style.transition=".5s";

        this.style.position="relative";
        this.style.overflow="hidden";

        this.appendChild(ripple);

        requestAnimationFrame(()=>{

            ripple.style.transform="scale(30)";
            ripple.style.opacity="0";

        });

        setTimeout(()=>{

            ripple.remove();

        },500);

    });

});

// ===========================
// Auto Scroll
// ===========================

function scrollBottom(){

    const box=document.getElementById("messagesContainer");

    if(box){

        box.scrollTop=box.scrollHeight;

    }

}

setInterval(scrollBottom,1000);

// ===========================
// Online / Offline
// ===========================

window.addEventListener("online",()=>{

    console.log("✅ Connected");

});

window.addEventListener("offline",()=>{

    alert("No Internet Connection");

});

// ===========================
// Page Animation
// ===========================

document.body.style.opacity="0";

window.onload=()=>{

    document.body.style.transition=".4s";

    document.body.style.opacity="1";

};

// ===========================
// Version
// ===========================

console.log("✅ Viewora Chat V3.0 Loaded");

</script>

</body>
</html>
