<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewora • Chat</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0d0d0d;
color:#fff;
height:100vh;
overflow:hidden;

}

/* Background */

body::before{

content:"";

position:fixed;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:
radial-gradient(circle,#00aaff22,transparent 35%),
radial-gradient(circle,#ff008822,transparent 35%),
radial-gradient(circle,#00ff8822,transparent 35%);

animation:bgRotate 18s linear infinite;

z-index:-2;

}

@keyframes bgRotate{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

/* Header */

.chat-header{

position:fixed;

top:0;
left:0;

width:100%;

height:72px;

display:flex;

align-items:center;

padding:12px 15px;

background:rgba(18,18,18,.92);

backdrop-filter:blur(16px);

border-bottom:1px solid rgba(255,255,255,.08);

z-index:999;

}

/* Back */

.back-btn{

font-size:26px;

cursor:pointer;

margin-right:12px;

transition:.25s;

}

.back-btn:hover{

transform:translateX(-4px);

}

/* User */

.user-box{

display:flex;

align-items:center;

cursor:pointer;

flex:1;

}

.user-photo{

width:48px;

height:48px;

border-radius:50%;

object-fit:cover;

border:2px solid #00aaff;

box-shadow:0 0 15px rgba(0,170,255,.4);

}

.user-info{

margin-left:12px;

}

#chatUserName{

font-size:17px;

font-weight:bold;

}

#chatStatus{

font-size:13px;

color:#00ff66;

margin-top:2px;

}

/* Icons */

.header-icons{

display:flex;

align-items:center;

gap:18px;

font-size:22px;

}

.header-icons span{

cursor:pointer;

transition:.25s;

}

.header-icons span:hover{

color:#00aaff;

transform:scale(1.15);

}

/* 3 Dot Menu */

.chat-menu{

display:none;

position:absolute;

top:70px;

right:15px;

width:210px;

background:#1b1b1b;

border-radius:14px;

overflow:hidden;

box-shadow:0 12px 30px rgba(0,0,0,.45);

border:1px solid rgba(255,255,255,.06);

z-index:9999;

}

.chat-menu div{

padding:15px 18px;

cursor:pointer;

transition:.25s;

font-size:15px;

}

.chat-menu div:hover{

background:#2a2a2a;

}

.chat-menu div:not(:last-child){

border-bottom:1px solid #333;

}

</style>

</head>

<body>

<!-- Header -->

<div class="chat-header">

<div
class="back-btn"
onclick="history.back()">

⬅

</div>

<div
class="user-box"
onclick="openProfile()">

<img
id="chatUserPhoto"
class="user-photo"
src="non.jpg">

<div class="user-info">

<div id="chatUserName">

Loading...

</div>

<div id="chatStatus">

Connecting...

</div>

</div>

</div>

<div class="header-icons">

<span onclick="voiceCall()">
📞
</span>

<span onclick="videoCall()">
🎥
</span>

<span onclick="toggleChatMenu()">
⋮
</span>

</div>

</div>

<!-- 3 Dot Menu -->

<div
id="chatMenu"
class="chat-menu">

<div onclick="openProfile()">
👤 About User
</div>

<div onclick="reportUser()">
🚩 Report User
</div>

<div onclick="blockUser()">
🚫 Block User
</div>

</div>
<!-- ========================= -->
<!-- Messages Area -->
<!-- ========================= -->

<style>

/* Chat Area */

.chat-area{

margin-top:72px;
margin-bottom:82px;

height:calc(100vh - 154px);

overflow-y:auto;

padding:15px;

scroll-behavior:smooth;

}

.chat-area::-webkit-scrollbar{

width:6px;

}

.chat-area::-webkit-scrollbar-thumb{

background:#00aaff;
border-radius:20px;

}

/* Date Divider */

.chat-date{

text-align:center;

margin:18px 0;

font-size:13px;

color:#999;

}

/* Message */

.message{

max-width:78%;

padding:12px 16px;

border-radius:18px;

margin:10px 0;

word-wrap:break-word;

animation:pop .25s ease;

position:relative;

}

/* Sent */

.sent{

margin-left:auto;

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

border-bottom-right-radius:6px;

}

/* Received */

.received{

margin-right:auto;

background:#242424;

color:#fff;

border-bottom-left-radius:6px;

border:1px solid rgba(255,255,255,.05);

}

/* Images */

.message img{

width:100%;

border-radius:12px;

margin-top:8px;

display:block;

}

/* Videos */

.message video{

width:100%;

border-radius:12px;

margin-top:8px;

display:block;

}

/* Time */

.message-time{

display:flex;

justify-content:flex-end;

align-items:center;

gap:5px;

margin-top:6px;

font-size:11px;

opacity:.75;

}

/* Seen Tick */

.message-status{

font-size:12px;

font-weight:bold;

}

.message-status.seen{

color:#5dd6ff;

}

.message-status.delivered{

color:#ddd;

}

/* Reply Preview */

.reply-box{

padding:8px;

margin-bottom:8px;

background:rgba(255,255,255,.08);

border-left:3px solid #00aaff;

border-radius:8px;

font-size:13px;

color:#ddd;

}

/* Typing */

.typing-box{

display:none;

width:max-content;

background:#242424;

padding:10px 15px;

border-radius:18px;

margin:10px 0;

}

.typing-dot{

display:inline-block;

width:8px;

height:8px;

border-radius:50%;

background:#00aaff;

margin:0 2px;

animation:bounce .7s infinite;

}

.typing-dot:nth-child(2){

animation-delay:.15s;

}

.typing-dot:nth-child(3){

animation-delay:.3s;

}

@keyframes bounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-5px);

}

}

@keyframes pop{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>

<!-- ========================= -->
<!-- Messages Container -->
<!-- ========================= -->

<div
id="messagesContainer"
class="chat-area">

<!-- Messages will load here -->

<div
id="typingIndicator"
class="typing-box">

<span class="typing-dot"></span>

<span class="typing-dot"></span>

<span class="typing-dot"></span>

</div>

</div>
<!-- ========================= -->
<!-- Chat Input Styles -->
<!-- ========================= -->

<style>

.chat-input-area{

position:fixed;

left:0;
bottom:0;

width:100%;

padding:12px;

display:flex;

align-items:center;

gap:10px;

background:rgba(20,20,20,.92);

backdrop-filter:blur(15px);

border-top:1px solid rgba(255,255,255,.08);

z-index:999;

}

/* Icon Buttons */

.icon-btn{

width:44px;
height:44px;

border:none;

border-radius:50%;

background:#242424;

color:#fff;

font-size:20px;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

transition:.25s;

}

.icon-btn:hover{

background:#00aaff;

transform:scale(1.08);

}

/* Message Input */

#messageInput{

flex:1;

height:48px;

padding:0 18px;

border:none;

outline:none;

border-radius:30px;

background:#1b1b1b;

color:#fff;

font-size:15px;

}

#messageInput::placeholder{

color:#888;

}

/* Send Button */

.send-btn{

width:52px;

height:52px;

border:none;

border-radius:50%;

background:linear-gradient(135deg,#00aaff,#0077ff);

color:#fff;

font-size:22px;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 0 18px rgba(0,170,255,.35);

transition:.25s;

}

.send-btn:hover{

transform:scale(1.08);

}

/* Recording Box */

.record-box{

display:none;

position:fixed;

bottom:82px;

left:50%;

transform:translateX(-50%);

padding:12px 22px;

background:#1b1b1b;

border-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.35);

font-size:15px;

z-index:1000;

}

.record-dot{

display:inline-block;

width:10px;

height:10px;

border-radius:50%;

background:red;

margin-right:8px;

animation:blink 1s infinite;

}

@keyframes blink{

0%,100%{opacity:1;}

50%{opacity:.2;}

}

</style>

<!-- ========================= -->
<!-- Recording Indicator -->
<!-- ========================= -->

<div
id="recordBox"
class="record-box">

<span class="record-dot"></span>

Recording Voice...

</div>

<!-- ========================= -->
<!-- Chat Input -->
<!-- ========================= -->

<div class="chat-input-area">

<!-- Emoji -->

<button
class="icon-btn"
onclick="openEmojiPicker()"
title="Emoji">

😊

</button>

<!-- Attachment -->

<button
class="icon-btn"
onclick="document.getElementById('chatFile').click()"
title="Attachment">

📎

</button>

<!-- Camera -->

<button
class="icon-btn"
onclick="openCamera()"
title="Camera">

📷

</button>

<!-- Voice -->

<button
class="icon-btn"
onclick="startVoiceRecording()"
title="Voice Message">

🎤

</button>

<!-- Message -->

<input

type="text"

id="messageInput"

placeholder="Type a message..."

autocomplete="off">

<!-- Send -->

<button

class="send-btn"

onclick="sendMessage()"

title="Send">

➤

</button>

</div>

<!-- ========================= -->
<!-- Hidden File Picker -->
<!-- ========================= -->

<input

type="file"

id="chatFile"

hidden

accept="image/*,video/*"

onchange="uploadChatFile(event)">
<!-- ========================= -->
<!-- Firebase SDK -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- Viewora Scripts -->

<script src="firebase.js"></script>
<script src="chat.js"></script>
<script src="nav.js"></script>

<script>

// =======================
// Auto Focus
// =======================

window.addEventListener("load",()=>{

const input=document.getElementById("messageInput");

if(input) input.focus();

});

// =======================
// Chat Menu
// =======================

function toggleChatMenu(){

const menu=document.getElementById("chatMenu");

menu.style.display=
menu.style.display==="block"
?"none":"block";

}

// Close menu

document.addEventListener("click",(e)=>{

const menu=document.getElementById("chatMenu");

if(!menu)return;

if(
!menu.contains(e.target) &&
!e.target.innerText.includes("⋮")
){

menu.style.display="none";

}

});

// =======================
// About User
// =======================

function openProfile(){

if(typeof otherUserUid==="undefined") return;

location.href=
"profile.html?uid="+otherUserUid;

}

// =======================
// Report User
// =======================

function reportUser(){

if(!confirm("Report this user?")) return;

db.ref("reports").push({

reportedUid:otherUserUid,

reportedBy:currentUser.uid,

time:Date.now(),

reason:"User Report"

});

alert("Report submitted.");

toggleChatMenu();

}

// =======================
// Block User
// =======================

function blockUser(){

if(!confirm("Block this user?")) return;

db.ref(
"blocks/"+currentUser.uid+"/"+otherUserUid
).set(true);

alert("User Blocked");

history.back();

}

// =======================
// Voice Call
// =======================

function voiceCall(){

alert("Voice Calling feature coming soon.");

}

// =======================
// Video Call
// =======================

function videoCall(){

alert("Video Calling feature coming soon.");

}

// =======================
// Emoji
// =======================

function openEmojiPicker(){

const input=document.getElementById("messageInput");

if(input){

input.value+="😊";

input.focus();

}

}

// =======================
// Camera
// =======================

function openCamera(){

document.getElementById("chatFile").click();

}

// =======================
// Voice Recording
// =======================

function startVoiceRecording(){

const box=document.getElementById("recordBox");

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

alert("Voice message support coming soon.");

},2500);

}

// =======================
// Internet Status
// =======================

window.addEventListener("online",()=>{

console.log("✅ Connected");

});

window.addEventListener("offline",()=>{

alert("No Internet Connection");

});

// =======================
// Fade Animation
// =======================

window.addEventListener("load",()=>{

document.body.style.opacity="0";

document.body.style.transition=".35s";

requestAnimationFrame(()=>{

document.body.style.opacity="1";

});

});

// =======================
// Version
// =======================

console.log("✅ Viewora Chat V4 Loaded");

</script>

</body>
</html>
